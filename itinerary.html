<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>旅遊行程</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e0c0b;
  --ink2:#4a3f38;
  --ink3:#9a8a80;
  --cream:#faf7f4;
  --warm:#f0e9e2;
  --border:#e5ddd6;
  --red:#c8392b;
  --red-l:#fdf0ee;

  /* category gradients for photo area */
  --g-sight:  linear-gradient(160deg,#1a3a5c 0%,#2e6da4 50%,#6fb3d3 100%);
  --g-food:   linear-gradient(160deg,#5c1a0e 0%,#c0502a 50%,#e8956a 100%);
  --g-hotel:  linear-gradient(160deg,#0e3320 0%,#1e7a45 50%,#5fba80 100%);
  --g-shop:   linear-gradient(160deg,#3a1a5c 0%,#7a3aaa 50%,#c08ae0 100%);
  --g-transport:linear-gradient(160deg,#2a2a2a 0%,#5a5a5a 50%,#9a9a9a 100%);
  --g-other:  linear-gradient(160deg,#4a3a10 0%,#a08020 50%,#d4b060 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  padding-bottom:80px;
  font-family:'DM Sans','Noto Sans TC',sans-serif;
  background:var(--cream);
  color:var(--ink);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:24px;
}

/* ─── STICKY HEADER ─── */
.header{
  background:var(--cream);
  border-bottom:1px solid var(--border);
  padding:18px 20px 0;
  position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.trip-label{
  font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--ink3);
  margin-bottom:4px;
}
.trip-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;color:var(--ink);
  cursor:pointer;line-height:1.1;
  display:flex;align-items:center;gap:7px;
}
.trip-title:active{opacity:.7;}


/* ─── DAY TABS ─── */
.tabs-row{display:flex;align-items:center;gap:6px;padding-bottom:14px;}
.tabs-scroll{display:flex;gap:5px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.day-tab{
  flex-shrink:0;padding:6px 16px;
  border-radius:30px;border:1px solid var(--border);
  background:transparent;color:var(--ink3);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;position:relative;
  display:flex;flex-direction:column;align-items:center;
}
.day-tab .tab-day{font-size:13px;font-weight:700;line-height:1.2;}
.day-tab .tab-date{font-size:9px;opacity:.65;margin-top:1px;}
.day-tab.active{
  background:var(--ink);color:#fff;
  border-color:var(--ink);
  box-shadow:0 3px 14px rgba(14,12,11,.22);
}
.tab-del-x{
  display:none;position:absolute;top:-5px;right:-5px;
  width:15px;height:15px;border-radius:50%;
  background:var(--red);color:#fff;font-size:8px;
  border:none;cursor:pointer;align-items:center;justify-content:center;
}
.tabs-edit-mode .tab-del-x{display:flex;}
.btn-tab-sm{
  flex-shrink:0;padding:6px 11px;border-radius:30px;
  border:1px solid var(--border);background:transparent;
  color:var(--ink2);font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;
  transition:all .15s;
}
.btn-tab-sm:active{background:var(--warm);}
.btn-tab-sm.active-edit{background:var(--red);color:#fff;border-color:var(--red);}

/* ─── CONTENT ─── */
.day-section{display:none;}
.day-section.active{display:block;}

.day-header-row{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:16px 20px 8px;
}
.day-date-label{
  font-family:'Playfair Display',serif;
  font-size:15px;font-style:italic;color:var(--ink2);font-weight:700;
}
.day-note-toggle{
  font-size:11px;color:var(--ink3);background:none;border:none;
  cursor:pointer;transition:color .15s;
}
.day-note-toggle:active{color:var(--ink);}
.day-note-panel{max-height:0;overflow:hidden;transition:max-height .3s;padding:0 20px;}
.day-note-panel.open{max-height:180px;}
.day-note-ta{
  width:100%;border:1px solid var(--border);border-radius:10px;
  background:var(--warm);padding:10px 12px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);
  resize:none;min-height:64px;outline:none;transition:border-color .2s;
}
.day-note-ta:focus{border-color:var(--ink);}

/* ─── CARD FEED ─── */
.spot-list{padding:6px 20px 0;}

.spot-card{
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);
  background:#fff;
  margin-bottom:16px;
  box-shadow:0 2px 16px rgba(14,12,11,.07);
  transition:box-shadow .2s;
  cursor:default;
}
.spot-card.dragging{opacity:.4;box-shadow:none;}
.spot-card.drag-over{box-shadow:0 0 0 2px var(--ink);}

/* photo area */
.card-photo{
  width:100%;height:180px;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.card-photo-bg{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:54px;
  transition:transform .3s;
}
.card-photo:active .card-photo-bg{transform:scale(1.03);}

/* gradient per category */
.photo-sight     {background:var(--g-sight);}
.photo-food      {background:var(--g-food);}
.photo-hotel     {background:var(--g-hotel);}
.photo-shop      {background:var(--g-shop);}
.photo-transport {background:var(--g-transport);}
.photo-other     {background:var(--g-other);}

/* overlay chips on photo */
.photo-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:12px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.06) 0%,rgba(0,0,0,.0) 40%,rgba(0,0,0,.55) 100%);
}
.photo-top{display:flex;justify-content:space-between;align-items:flex-start;}
.photo-time-badge{
  background:rgba(255,255,255,.92);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
  padding:4px 11px;border-radius:20px;
  cursor:pointer;transition:background .15s;letter-spacing:.3px;
  border:none;backdrop-filter:blur(4px);
}
.photo-time-badge:active{background:rgba(255,255,255,.7);}
.photo-actions{display:flex;gap:5px;}
.photo-btn{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.85);color:var(--ink2);
  border:none;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;backdrop-filter:blur(4px);
}
.photo-btn:active{background:#fff;transform:scale(.9);}
@keyframes swPulse{0%,100%{box-shadow:0 0 0 2px rgba(200,57,43,.5);}50%{box-shadow:0 0 0 6px rgba(200,57,43,.1);}}
.photo-bottom{display:flex;align-items:flex-end;justify-content:space-between;}
.photo-cat-badge{
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.2);
}
.photo-icon-big{
  font-size:52px;
  opacity:.55;
  user-select:none;
}

/* card body */
.card-body{padding:14px 16px 14px;}
.card-title-row{
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  margin-bottom:10px;
}
.card-name{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:var(--ink);
  cursor:pointer;line-height:1.2;flex:1;min-width:0;
}
.card-name:active{opacity:.7;}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.meta-pill{
  font-size:11px;font-weight:500;color:var(--ink2);
  background:var(--warm);border:1px solid var(--border);
  padding:3px 10px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
}
.card-note-preview{
  font-size:12px;color:var(--ink3);line-height:1.5;
  margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-chips{display:flex;gap:5px;flex-wrap:wrap;}
.info-chip{
  font-size:11px;padding:3px 10px;border-radius:8px;
  background:var(--warm);color:var(--ink2);border:1px solid var(--border);
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
  transition:all .12s;
}
.info-chip:active{background:var(--border);}

/* ─── DETAIL EXPAND ─── */
.card-detail{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.card-detail.open{max-height:700px;}
.card-detail-inner{
  border-top:1px solid var(--border);
  padding:14px 16px 10px;
  display:flex;flex-direction:column;gap:10px;
}
.det-lbl{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--ink3);margin-bottom:-4px;
}
.det-row{display:flex;align-items:center;gap:8px;}
.det-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;color:var(--ink3);}
.det-input{
  flex:1;border:none;border-bottom:1.5px solid var(--border);
  background:transparent;padding:5px 2px;
  font-family:'DM Sans','Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.det-input:focus{border-bottom-color:var(--ink);}
.det-btn{
  padding:4px 11px;border-radius:8px;border:1px solid var(--border);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  background:var(--warm);color:var(--ink2);transition:all .15s;
}
.det-btn:active{background:var(--ink);color:#fff;border-color:var(--ink);}
.det-ta{
  flex:1;border:1px solid var(--border);background:var(--warm);
  border-radius:8px;padding:8px 10px;
  font-family:'DM Sans','Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);
  resize:none;min-height:54px;outline:none;transition:border-color .2s;
}
.det-ta:focus{border-color:var(--ink);}
.save-btn{
  width:100%;padding:11px;border-radius:10px;border:none;
  background:var(--ink);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
  letter-spacing:.3px;
}
.save-btn:active{opacity:.8;}

/* ─── IMAGE UPLOAD ─── */
.img-upload-area{
  width:100%;height:140px;border-radius:12px;
  border:2px dashed var(--border);background:var(--warm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;transition:all .2s;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.img-upload-area:active{border-color:var(--ink);background:var(--border);}
.img-upload-area.has-img{border-style:solid;border-color:var(--border);}
.img-upload-preview{
  width:100%;height:100%;object-fit:cover;display:none;
}
.img-upload-area.has-img .img-upload-preview{display:block;}
.img-upload-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  pointer-events:none;
}
.img-upload-area.has-img .img-upload-placeholder{display:none;}
.img-upload-icon{font-size:28px;opacity:.4;}
.img-upload-hint{font-size:11px;color:var(--ink3);font-weight:500;}
.img-clear-btn{
  position:absolute;top:8px;right:8px;
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;font-size:12px;
  border:none;cursor:pointer;display:none;
  align-items:center;justify-content:center;
}
.img-upload-area.has-img .img-clear-btn{display:flex;}
#sImgInput{display:none;}

/* card action bar — icon circles, inline with name */
.card-action-bar{
  display:flex;flex-direction:row;gap:5px;flex-shrink:0;align-items:center;padding-top:3px;
}
.card-act-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);background:var(--warm);
  font-size:14px;cursor:pointer;transition:all .15s;flex-shrink:0;
}
.card-act-btn:active{background:var(--border);}
.card-act-btn.sw-btn.running{
  background:var(--red);color:#fff;border-color:var(--red);
  animation:swPulse 1.1s ease-in-out infinite;
}
.card-act-btn.edit-btn:active{background:var(--ink);border-color:var(--ink);}

.add-spot-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;margin:4px 0 20px;padding:13px;
  border-radius:14px;border:1.5px dashed var(--border);background:transparent;
  color:var(--ink3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.add-spot-btn:active{border-color:var(--ink);color:var(--ink);background:var(--warm);}

/* ─── FAB ─── */
.fab{
  position:fixed;bottom:84px;right:20px;
  width:52px;height:52px;border-radius:50%;
  background:var(--ink);color:#fff;font-size:24px;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(14,12,11,.28);
  transition:transform .2s;z-index:50;
}
.fab:active{transform:scale(.92);}

/* ─── MODALS ─── */
.overlay{
  position:fixed;inset:0;background:rgba(14,12,11,.5);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .22s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--cream);width:100%;max-width:430px;
  border-radius:22px 22px 0 0;
  padding:12px 20px 36px;
  max-height:92vh;overflow-y:auto;
  transform:translateY(40px);transition:transform .22s;
  border-top:3px solid var(--ink);
}
.overlay.open .modal{transform:translateY(0);}
.m-handle{width:32px;height:3px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
.m-title{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  color:var(--ink);margin-bottom:16px;
}
.m-label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--ink3);margin-bottom:5px;
}
.m-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'DM Sans','Noto Sans TC',sans-serif;font-size:14px;color:var(--ink);
  outline:none;margin-bottom:12px;background:#fff;transition:border-color .2s;
}
.m-input:focus{border-color:var(--ink);}
.cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.c-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);background:var(--warm);
  color:var(--ink2);transition:all .15s;
}
.c-chip.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.m-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:var(--ink);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .15s;letter-spacing:.3px;
}
.m-btn:active{opacity:.8;}
.m-btn.ghost{background:var(--warm);color:var(--ink2);border:1.5px solid var(--border);}
.m-del-btn{
  width:100%;padding:12px;border-radius:12px;
  border:1.5px solid rgba(200,57,43,.35);background:var(--red-l);color:var(--red);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:8px;transition:background .15s;
}
.m-del-btn:active{background:#fae0dd;}

/* time picker */
.tp-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px;}
.tp-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.tp-val{
  font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--ink);
  min-width:78px;text-align:center;background:var(--warm);
  border-radius:12px;padding:8px 12px;border:1px solid var(--border);
}
.tp-sep{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;color:var(--red);margin-bottom:12px;}
.tp-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--warm);color:var(--ink);font-size:17px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.tp-btn:active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* stopwatch */
.sw-label{
  text-align:center;font-size:10px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--ink3);margin-bottom:12px;
}
.sw-screen{
  background:var(--ink);border-radius:16px;
  margin:0 0 14px;padding:20px 14px 16px;text-align:center;
}
.sw-display{
  font-family:'Playfair Display',serif;font-weight:700;font-size:60px;
  color:#fff;line-height:1;
  display:flex;align-items:baseline;justify-content:center;
  font-variant-numeric:tabular-nums;
}
.sw-ms{font-family:'DM Sans',sans-serif;font-size:28px;color:rgba(255,255,255,.4);margin-left:5px;}
.sw-result-area{margin-top:12px;display:none;flex-direction:column;gap:4px;}
.sw-result-area.show{display:flex;}
.sw-result-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.sw-result-lbl{color:rgba(255,255,255,.45);font-weight:500;}
.sw-result-val{color:#fff;font-weight:700;}
.sw-controls{display:flex;gap:8px;margin-bottom:12px;}
.sw-ctrl-btn{
  flex:1;padding:13px;border-radius:12px;border:none;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
}
.sw-ctrl-btn:active{opacity:.8;}
.sw-start{background:#d5f0dc;color:#1a6632;}
.sw-stop {background:#fde8e6;color:var(--red);}
.sw-reset{background:var(--warm);color:var(--ink2);border:1px solid var(--border);flex:0 0 74px;}
.sw-use-btn{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--red);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;margin-bottom:8px;display:none;transition:opacity .15s;
}
.sw-use-btn:active{opacity:.8;}
.sw-use-btn.show{display:block;}

.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:#fff;padding:9px 20px;
  border-radius:20px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink3);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty-state p{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="trip-label">✈ My Journey</div>
      <div class="trip-title" onclick="editTripTitle()">
        <span id="tripTitleText">🌏 日本東京五日遊</span>
      </div>
    </div>
  </div>
  <div class="tabs-row">
    <div class="tabs-scroll" id="tabsWrap"></div>
    <button class="btn-tab-sm" onclick="addDay()">＋</button>
    <button class="btn-tab-sm" id="tabEditBtn" onclick="toggleTabEditMode()">✎</button>
  </div>
</div>

<div id="mainContent"></div>

<button class="fab" onclick="addSpot()">＋</button>

<!-- Spot Modal -->
<div class="overlay" id="spotModal">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title" id="spotModalTitle">新增景點</div>
    <div class="m-label">封面圖片</div>
    <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('sImgInput').click()">
      <img class="img-upload-preview" id="imgPreview" src="" alt=""/>
      <div class="img-upload-placeholder">
        <div class="img-upload-icon">🖼️</div>
        <div class="img-upload-hint">點擊選擇圖片</div>
      </div>
      <button class="img-clear-btn" id="imgClearBtn" onclick="clearImg(event)">✕</button>
    </div>
    <input type="file" id="sImgInput" accept="image/*" onchange="handleImgUpload(event)"/>
    <div class="m-label">景點名稱</div>
    <input class="m-input" id="sName" placeholder="景點 / 活動名稱" />
    <div class="m-label">地址</div>

        <span id="swH" style="display:none"></span><span id="swM">0</span>:<span id="swS">00</span><span class="sw-ms">.<span id="swCs">00</span></span>

        <div class="sw-result-row"><span class="sw-result-lbl">⏱ 計時結果</span><span class="sw-result-val" id="swResTotal">—</span></div>

<div class="toast" id="toast"></div>

<script>
/* ── CATEGORY META ── */
const CI={
  sight:    {label:'🏛 景點', photo:'photo-sight',    icon:'🏛'},
  food:     {label:'🍜 餐廳', photo:'photo-food',     icon:'🍜'},
  hotel:    {label:'🏨 住宿', photo:'photo-hotel',    icon:'🏨'},
  shop:     {label:'🛍 購物', photo:'photo-shop',     icon:'🛍'},
  transport:{label:'🚌 交通', photo:'photo-transport',icon:'🚌'},
  other:    {label:'📌 其他', photo:'photo-other',    icon:'📌'},
};

/* ── STATE ── */
const S={
  title:'🌏 日本東京五日遊',
  days:[
    {id:1,label:'Day 1',date:'06/10 週一',isoDate:'',note:'',noteOpen:false,spots:[
      {id:101,name:'成田機場',cat:'transport',time:'10:30',dur:60,addr:'千葉縣成田市',phone:'',note:'換JR Pass！出關後左轉',detail:false,tr:'',durText:'1小時',img:null},
      {id:102,name:'淺草寺',cat:'sight',time:'14:00',dur:90,addr:'東京都台東區淺草2-3-1',phone:'03-3842-0181',note:'人潮多，早點去',detail:false,tr:'搭地鐵約25分',durText:'1小時30分',img:null},
      {id:103,name:'雷門拉麵',cat:'food',time:'16:30',dur:60,addr:'東京都台東區淺草1-7',phone:'',note:'道地老店，必點叉燒拉麵',detail:false,tr:'步行5分',durText:'1小時',img:null},
    ]},
    {id:2,label:'Day 2',date:'06/11 週二',isoDate:'',note:'',noteOpen:false,spots:[
      {id:201,name:'新宿御苑',cat:'sight',time:'09:00',dur:120,addr:'東京都新宿區內藤町11',phone:'03-3350-0151',note:'帶飲料去野餐',detail:false,tr:'',durText:'2小時',img:null},
      {id:202,name:'新宿高島屋',cat:'shop',time:'13:00',dur:120,addr:'東京都渋谷區千駄ヶ谷5-24-2',phone:'',note:'',detail:false,tr:'步行10分',durText:'2小時',img:null},
      {id:203,name:'歌舞伎町居酒屋',cat:'food',time:'19:00',dur:90,addr:'東京都新宿區歌舞伎町',phone:'',note:'已預約！',detail:false,tr:'步行5分',durText:'1小時30分',img:null},
    ]},
    {id:3,label:'Day 3',date:'06/12 週三',isoDate:'',note:'',noteOpen:false,spots:[
      {id:301,name:'築地場外市場',cat:'food',time:'08:00',dur:90,addr:'東京都中央區築地4-16-2',phone:'',note:'早點去！海鮮最新鮮',detail:false,tr:'',durText:'1小時30分',img:null},
      {id:302,name:'東京鐵塔',cat:'sight',time:'11:00',dur:90,addr:'東京都港區芝公園4-2-8',phone:'03-3433-5111',note:'',detail:false,tr:'搭地鐵約30分',durText:'1小時30分',img:null},
      {id:303,name:'六本木之丘',cat:'shop',time:'14:00',dur:120,addr:'東京都港區六本木6-10-1',phone:'',note:'',detail:false,tr:'步行10分',durText:'2小時',img:null},
      {id:304,name:'東京中城飯店',cat:'hotel',time:'18:00',dur:30,addr:'東京都港區赤坂9-7-1',phone:'03-3475-3100',note:'Check-in 帶護照',detail:false,tr:'搭車15分',durText:'30分',img:null},
    ]},
  ],
  activeDay:0,editSpotId:null,editTimeId:null,editDayIdx:null,
  selCat:'sight',tmpH:9,tmpM:0,tabEditMode:false,nid:500,
};

function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function durStr(d){const h=Math.floor(d/60),m=d%60;return h?`${h}小時${m?m+'分':''}`:m+'分';}
function findSpot(id){for(const d of S.days){const s=d.spots.find(x=>x.id===id);if(s)return s;}return null;}
function findDi(id){for(let i=0;i<S.days.length;i++){if(S.days[i].spots.find(x=>x.id===id))return i;}return -1;}

/* ── RENDER ── */
function render(){renderTabs();renderDays();}

function renderTabs(){
  const wrap=document.getElementById('tabsWrap');
  wrap.innerHTML='';
  S.days.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='day-tab'+(i===S.activeDay?' active':'');
    btn.innerHTML=`<span class="tab-day">${e(d.label)}</span><span class="tab-date">${e(d.date)}</span><button class="tab-del-x" onclick="tabDelDay(${i},event)">✕</button>`;
    btn.onclick=()=>{if(S.tabEditMode){openDayEdit(i);}else{S.activeDay=i;render();}};
    wrap.appendChild(btn);
  });
  wrap.classList.toggle('tabs-edit-mode',!!S.tabEditMode);
  document.getElementById('tabEditBtn').classList.toggle('active-edit',!!S.tabEditMode);
  document.getElementById('tabEditBtn').textContent=S.tabEditMode?'完成':'✎';
  const tabs=wrap.querySelectorAll('.day-tab');
  if(tabs[S.activeDay]) tabs[S.activeDay].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderDays(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='';
  S.days.forEach((day,di)=>{
    const sec=document.createElement('div');
    sec.className='day-section'+(di===S.activeDay?' active':'');
    const hasNote=day.note||day.noteOpen;
    sec.innerHTML=`
      <div class="day-header-row">
        <div class="day-date-label">${e(day.date)}</div>
        <button class="day-note-toggle" onclick="toggleDayNote(${di})">📝 備註${day.note?' ●':''}</button>
      </div>
      <div class="day-note-panel${hasNote?' open':''}" id="dnp-${di}" style="padding:0 20px 10px;">
        <textarea class="day-note-ta" placeholder="本日備註…" oninput="S.days[${di}].note=this.value">${e(day.note||'')}</textarea>
      </div>
      <div class="spot-list" id="sl-${di}"></div>
      <div style="padding:0 20px;">
        <button class="add-spot-btn" onclick="S.activeDay=${di};addSpot()">＋ 新增景點</button>
      </div>
    `;
    mc.appendChild(sec);
    renderList(di);
  });
}

function renderList(di){
  const list=document.getElementById(`sl-${di}`);
  if(!list)return;
  const spots=S.days[di].spots;
  if(!spots.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">✈️</div><p>點擊下方按鈕新增第一個景點</p></div>`;return;}
  list.innerHTML=spots.map((s,si)=>cardHTML(s,di,si)).join('');
  bindDrag(di);
  spots.forEach(s=>{
    ['dur','tr'].forEach(f=>{
      const t=getTmr(s.id,f);
      if(t.running){const b=document.getElementById(f==='dur'?`swDur-${s.id}`:`swTr-${s.id}`);if(b)b.classList.add('running');}
    });
  });
}

function cardHTML(s,di,si){
  const ci=CI[s.cat]||CI.other;
  const ds=s.durText||durStr(s.dur);
  const photoBg=s.img
    ? `<img src="${s.img}" style="width:100%;height:100%;object-fit:cover;display:block;" alt=""/>`
    : `<div class="card-photo-bg ${ci.photo}"><span style="font-size:52px;opacity:.55">${ci.icon}</span></div>`;
  return`
<div class="spot-card" id="sc-${s.id}" data-di="${di}" data-si="${si}" draggable="true">
  <div class="card-photo">
    ${photoBg}
    <div class="photo-overlay">
      <div class="photo-top">
        <button class="photo-time-badge" onclick="openTimePicker(${s.id})">${e(s.time)}</button>
      </div>
      <div class="photo-bottom">
        <span class="photo-cat-badge">${ci.label}</span>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="card-title-row">
      <div class="card-name" onclick="toggleDet(${s.id})">${e(s.name)}</div>
      <div class="card-action-bar">
        <button class="card-act-btn sw-btn" id="swDur-${s.id}" onclick="openSw(${s.id},'dur')" title="停留碼錶">⏱</button>
        <button class="card-act-btn sw-btn" id="swTr-${s.id}" onclick="openSw(${s.id},'tr')" title="交通碼錶">🚗</button>
        <button class="card-act-btn edit-btn" onclick="openEditSpot(${s.id})" title="編輯">✏️</button>
      </div>
    </div>
    <div class="card-meta">
      <span class="meta-pill">⏱ ${e(ds)}</span>
      ${s.tr?`<span class="meta-pill">🚗 ${e(s.tr)}</span>`:''}
    </div>
    ${s.note&&!s.detail?`<div class="card-note-preview">${e(s.note)}</div>`:''}
    ${s.addr||s.phone?`<div class="card-chips">
      ${s.addr?`<div class="info-chip" onclick="goNav('${e(s.addr)}')">📍 ${e(s.addr)}</div>`:''}
      ${s.phone?`<div class="info-chip" onclick="goCall('${e(s.phone)}')">📞 ${e(s.phone)}</div>`:''}
    </div>`:''}
  </div>
  <div class="card-detail${s.detail?' open':''}" id="det-${s.id}">
    <div class="card-detail-inner">
      <div class="det-lbl">停留時間</div>
      <div class="det-row"><span class="det-icon">⏱</span>
        <input class="det-input" placeholder="例：1小時30分" value="${e(s.durText||durStr(s.dur))}" onchange="updF(${s.id},'durText',this.value);recard(${s.id})"/></div>
      <div class="det-lbl">交通時間</div>
      <div class="det-row"><span class="det-icon">🚗</span>
        <input class="det-input" placeholder="前往方式、時間…" value="${e(s.tr||'')}" onchange="updF(${s.id},'tr',this.value);recard(${s.id})"/></div>
      <div class="det-lbl">地址 / 電話</div>
      <div class="det-row"><span class="det-icon">📍</span>
        <input class="det-input" placeholder="地址" value="${e(s.addr)}" onchange="updF(${s.id},'addr',this.value)"/>
        <button class="det-btn" onclick="goNav('${e(s.addr)}')">導航</button></div>
      <div class="det-row"><span class="det-icon">📞</span>
        <input class="det-input" placeholder="電話" value="${e(s.phone)}" onchange="updF(${s.id},'phone',this.value)"/>
        <button class="det-btn" onclick="goCall('${e(s.phone)}')">撥打</button></div>
      <div class="det-lbl">備註</div>
      <div class="det-row" style="align-items:flex-start"><span class="det-icon">📝</span>
        <textarea class="det-ta" placeholder="備註、連結…" onchange="updF(${s.id},'note',this.value)">${e(s.note||'')}</textarea></div>
      <button class="save-btn" onclick="saveSpot(${s.id})">儲存</button>
    </div>
  </div>
</div>`;
}

/* ── DRAG ── */
function bindDrag(di){
  document.querySelectorAll(`#sl-${di} .spot-card`).forEach(card=>{
    card.addEventListener('dragstart',ev=>{S.ddi=+card.dataset.di;S.dsi=+card.dataset.si;ev.dataTransfer.effectAllowed='move';setTimeout(()=>card.classList.add('dragging'),0);});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.spot-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',ev=>{ev.preventDefault();document.querySelectorAll(`#sl-${di} .spot-card`).forEach(c=>c.classList.remove('drag-over'));card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',ev=>{ev.preventDefault();card.classList.remove('drag-over');const tdi=+card.dataset.di,tsi=+card.dataset.si;if(S.ddi!==tdi||S.dsi===tsi)return;const arr=S.days[tdi].spots;const[mv]=arr.splice(S.dsi,1);arr.splice(tsi,0,mv);renderList(tdi);showToast('已重新排序 ✓');});
    let ty0=0,clone=null,src=null,tmr=null,active=false;
    card.addEventListener('touchstart',ev=>{if(ev.touches.length>1)return;ty0=ev.touches[0].clientY;tmr=setTimeout(()=>{active=true;src=card;S.ddi=+card.dataset.di;S.dsi=+card.dataset.si;const r=card.getBoundingClientRect();clone=card.cloneNode(true);clone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.55;pointer-events:none;z-index:9999;transform:scale(1.02);border-radius:16px;overflow:hidden;`;document.body.appendChild(clone);card.classList.add('dragging');},340);},{passive:true});
    card.addEventListener('touchmove',ev=>{clearTimeout(tmr);if(!active||!clone)return;ev.preventDefault();const dy=ev.touches[0].clientY-ty0;clone.style.top=(parseFloat(clone.style.top)+dy)+'px';ty0=ev.touches[0].clientY;document.querySelectorAll(`#sl-${di} .spot-card`).forEach(c=>c.classList.remove('drag-over'));const el=document.elementFromPoint(ev.touches[0].clientX,ev.touches[0].clientY);const tc=el&&el.closest('.spot-card');if(tc&&tc!==src)tc.classList.add('drag-over');},{passive:false});
    card.addEventListener('touchend',ev=>{clearTimeout(tmr);if(!active){active=false;return;}active=false;if(!clone)return;clone.remove();clone=null;src.classList.remove('dragging');document.querySelectorAll('.spot-card').forEach(c=>c.classList.remove('drag-over'));const pt=ev.changedTouches[0];const el=document.elementFromPoint(pt.clientX,pt.clientY);const tc=el&&el.closest('.spot-card');if(tc&&+tc.dataset.di===S.ddi&&+tc.dataset.si!==S.dsi){const arr=S.days[S.ddi].spots;const[mv]=arr.splice(S.dsi,1);arr.splice(+tc.dataset.si,0,mv);renderList(S.ddi);showToast('已重新排序 ✓');}});
  });
}

/* ── SPOT ACTIONS ── */
function toggleDet(id){const s=findSpot(id);if(!s)return;s.detail=!s.detail;const el=document.getElementById(`det-${id}`);el&&el.classList.toggle('open',s.detail);}
function updF(id,f,v){const s=findSpot(id);if(s)s[f]=v;}
function recard(id){
  const di=findDi(id);if(di<0)return;const s=findSpot(id);const si=S.days[di].spots.indexOf(s);
  const el=document.getElementById(`sc-${id}`);if(!el)return;
  const wasOpen=s.detail;
  el.outerHTML=cardHTML(s,di,si);
  if(wasOpen){const d=document.getElementById(`det-${id}`);d&&d.classList.add('open');}
  bindDrag(di);
  ['dur','tr'].forEach(f=>{const t=getTmr(id,f);if(t.running){const b=document.getElementById(f==='dur'?`swDur-${id}`:`swTr-${id}`);if(b)b.classList.add('running');}});
}
function saveSpot(id){
  const det=document.getElementById(`det-${id}`);if(!det)return;
  const s=findSpot(id);if(!s)return;
  const inputs=det.querySelectorAll('input.det-input,textarea.det-ta');
  ['durText','tr','addr','phone','note'].forEach((f,i)=>{if(inputs[i])s[f]=inputs[i].value;});
  s.detail=false;renderList(findDi(id));showToast('已儲存 ✓');
}
function quickDel(id){for(const d of S.days){const i=d.spots.findIndex(x=>x.id===id);if(i>=0){d.spots.splice(i,1);break;}}renderList(S.activeDay);showToast('已刪除');}
function goNav(a){if(!a){showToast('請先填入地址');return;}window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a)}`,'_blank');}
function goCall(p){if(!p){showToast('請先填入電話');return;}window.location.href=`tel:${p}`;}

/* ── ADD/EDIT SPOT ── */
function handleImgUpload(ev){
  const file=ev.target.files[0]; if(!file)return;
  S._tmpFile = file;  // 存 File 物件，不轉 base64
  const url = URL.createObjectURL(file);
  const area=document.getElementById('imgUploadArea');
  const prev=document.getElementById('imgPreview');
  prev.src=url; area.classList.add('has-img');
  S._tmpPreviewUrl = url;
}
function clearImg(ev){
  ev.stopPropagation();
  document.getElementById('imgUploadArea').classList.remove('has-img');
  document.getElementById('imgPreview').src='';
  document.getElementById('sImgInput').value='';
  S._tmpImg=null;
}
function _resetImgUI(src){
  const area=document.getElementById('imgUploadArea');
  const prev=document.getElementById('imgPreview');
  if(src){prev.src=src;area.classList.add('has-img');}
  else{prev.src='';area.classList.remove('has-img');}
  document.getElementById('sImgInput').value='';
  S._tmpImg=src||null;   // src is now a Storage URL (or null)
  S._tmpFile=null;
  S._tmpPreviewUrl=null;
}
function addSpot(){
  S.editSpotId=null;
  document.getElementById('spotModalTitle').textContent='新增景點';
  ['sName','sAddr','sPhone','sNote','sDur','sTr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sDelBtn').style.display='none';
  _resetImgUI(null);
  S.selCat='sight';document.querySelectorAll('.c-chip').forEach(c=>c.classList.toggle('sel',c.dataset.cat==='sight'));
  openO('spotModal');
}
function openEditSpot(id){
  const s=findSpot(id);if(!s)return;S.editSpotId=id;
  document.getElementById('spotModalTitle').textContent='編輯景點';
  document.getElementById('sName').value=s.name;document.getElementById('sAddr').value=s.addr;
  document.getElementById('sPhone').value=s.phone;document.getElementById('sNote').value=s.note||'';
  document.getElementById('sDur').value=s.durText||'';document.getElementById('sTr').value=s.tr||'';
  document.getElementById('sDelBtn').style.display='block';
  _resetImgUI(s.img||null);
  S.selCat=s.cat;document.querySelectorAll('.c-chip').forEach(c=>c.classList.toggle('sel',c.dataset.cat===s.cat));
  openO('spotModal');
}
function pickCat(el){S.selCat=el.dataset.cat;document.querySelectorAll('.c-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
async function confirmSpot(){
  const name=document.getElementById('sName').value.trim();if(!name){showToast('請輸入名稱');return;}
  const addr=document.getElementById('sAddr').value.trim(),phone=document.getElementById('sPhone').value.trim(),
        note=document.getElementById('sNote').value.trim(),durText=document.getElementById('sDur').value.trim(),
        tr=document.getElementById('sTr').value.trim();

  // 上傳圖片到 Firebase Storage（如有新選圖）
  let imgUrl = S._tmpImg || null;  // 預設用現有 URL
  if (S._tmpFile) {
    showToast('上傳圖片中…');
    try {
      const ext = S._tmpFile.name.split('.').pop() || 'jpg';
      const path = `itinerary/spots/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      imgUrl = await window._fbUpload(S._tmpFile, path);
    } catch(e) { showToast('圖片上傳失敗，以繼續儲存'); imgUrl = null; }
  }

  if(S.editSpotId){
    const s=findSpot(S.editSpotId);
    s.name=name;s.cat=S.selCat;s.addr=addr;s.phone=phone;s.note=note;s.durText=durText;s.tr=tr;s.img=imgUrl;
    showToast('已更新 ✓');
  } else {
    const day=S.days[S.activeDay];
    const last=day.spots.length?day.spots[day.spots.length-1].time:'09:00';
    const[lh,lm]=last.split(':').map(Number);
    day.spots.push({id:S.nid++,name,cat:S.selCat,
      time:`${String(Math.min(23,lh+1)).padStart(2,'0')}:${String(lm).padStart(2,'0')}`,
      dur:60,durText,addr,phone,note,detail:false,tr,img:imgUrl});
    showToast('已新增 ✓');
  }
  closeO('spotModal');
  renderList(S.activeDay);
  window._fbSave && window._fbSave();
}
function confirmDeleteSpot(){if(!S.editSpotId)return;quickDel(S.editSpotId);closeO('spotModal');}

/* ── TIME PICKER ── */
function openTimePicker(id){S.editTimeId=id;const s=findSpot(id);if(!s)return;const[h,m]=s.time.split(':').map(Number);S.tmpH=h;S.tmpM=m;updTP();openO('timeModal');}
function adj(p,d){if(p==='h')S.tmpH=(S.tmpH+d+24)%24;else S.tmpM=((S.tmpM+d)+60)%60;updTP();}
function updTP(){document.getElementById('tH').textContent=String(S.tmpH).padStart(2,'0');document.getElementById('tM').textContent=String(S.tmpM).padStart(2,'0');}
function confirmTime(){const s=findSpot(S.editTimeId);if(!s)return;s.time=`${String(S.tmpH).padStart(2,'0')}:${String(S.tmpM).padStart(2,'0')}`;closeO('timeModal');recard(S.editTimeId);showToast('時間已更新 ✓');}

/* ── DAY MANAGEMENT ── */
function toggleTabEditMode(){S.tabEditMode=!S.tabEditMode;renderTabs();}
function tabDelDay(di,ev){ev.stopPropagation();if(S.days.length<=1){showToast('至少保留一天');return;}S.days.splice(di,1);S.activeDay=Math.min(S.activeDay,S.days.length-1);render();showToast('已刪除此天');}
function addDay(){const n=S.days.length+1;const wk=['日','一','二','三','四','五','六'];S.days.push({id:Date.now(),label:`Day ${n}`,date:`06/${9+n} 週${wk[n%7]}`,isoDate:'',note:'',noteOpen:false,spots:[]});S.activeDay=S.days.length-1;render();showToast(`Day ${n} 已新增 ✓`);}
function openDayEdit(di){S.editDayIdx=di;document.getElementById('dLabel').value=S.days[di].label;document.getElementById('dDatePicker').value=S.days[di].isoDate||'';updateDayPreview();openO('dayModal');}
function updateDayPreview(){const v=document.getElementById('dDatePicker').value;const el=document.getElementById('dDatePreview');if(!v){el.textContent='';return;}const d=new Date(v+'T00:00:00');const wk=['日','一','二','三','四','五','六'];el.textContent=`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} 週${wk[d.getDay()]}`;}
function confirmDayEdit(){const di=S.editDayIdx;const l=document.getElementById('dLabel').value;const iso=document.getElementById('dDatePicker').value;if(l)S.days[di].label=l;if(iso){S.days[di].isoDate=iso;const d=new Date(iso+'T00:00:00');const wk=['日','一','二','三','四','五','六'];S.days[di].date=`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} 週${wk[d.getDay()]}`;}closeO('dayModal');render();showToast('已更新 ✓');}
function confirmDeleteDay(){if(S.days.length<=1){showToast('至少保留一天');return;}S.days.splice(S.editDayIdx,1);S.activeDay=Math.min(S.activeDay,S.days.length-1);closeO('dayModal');render();showToast('已刪除此天');}
function toggleDayNote(di){S.days[di].noteOpen=!S.days[di].noteOpen;const el=document.getElementById(`dnp-${di}`);if(el)el.classList.toggle('open',S.days[di].noteOpen||!!S.days[di].note);}
function editTripTitle(){document.getElementById('tripTitleInput').value=S.title;openO('titleModal');}
function confirmTripTitle(){const v=document.getElementById('tripTitleInput').value.trim();if(v){S.title=v;document.getElementById('tripTitleText').textContent=v;}closeO('titleModal');}
function sortByTime(){S.days[S.activeDay].spots.sort((a,b)=>a.time.localeCompare(b.time));renderList(S.activeDay);showToast('已排序 ✓');}

/* ── STOPWATCHES ── */
const TIMERS={};let swCtx=null;
function getTmr(spotId,field){const k=`${spotId}_${field}`;if(!TIMERS[k])TIMERS[k]={running:false,elapsed:0,startTs:null,startWall:null,endWall:null,interval:null};return TIMERS[k];}
function swFmt(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return{h,m,s,cs,mStr:h?String(m).padStart(2,'0'):String(m)};}
function fmtClock(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}
function minsLabel(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);const p=[];if(h)p.push(h+'小時');if(m)p.push(m+'分');if(s||(!h&&!m))p.push(s+'秒');return p.join('');}
function swTickModal(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);const ms=t.elapsed+(t.running?Date.now()-t.startTs:0);const f=swFmt(ms);document.getElementById('swH').textContent=f.h?f.h+':':'';document.getElementById('swH').style.display=f.h?'':'none';document.getElementById('swM').textContent=f.mStr;document.getElementById('swS').textContent=String(f.s).padStart(2,'0');document.getElementById('swCs').textContent=String(f.cs).padStart(2,'0');}
function swTickBtn(){if(!swCtx)return;const{spotId,field}=swCtx;const t=getTmr(spotId,field);const btn=document.getElementById(field==='dur'?`swDur-${spotId}`:`swTr-${spotId}`);if(btn)btn.classList.toggle('running',t.running);}
function swToggle(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);if(t.running)swStop();else swGo();}
function swGo(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);if(t.running)return;t.running=true;t.startTs=Date.now();if(!t.startWall)t.startWall=new Date();t.interval=setInterval(()=>{swTickModal();swTickBtn();},50);swUpdateUI();}
function swStop(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);if(!t.running)return;clearInterval(t.interval);t.interval=null;t.elapsed+=Date.now()-t.startTs;t.endWall=new Date();t.running=false;swTickModal();swTickBtn();swUpdateUI();swShowResult();}
function swReset(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);clearInterval(t.interval);t.interval=null;t.running=false;t.elapsed=0;t.startTs=null;t.startWall=null;t.endWall=null;swTickModal();swTickBtn();swUpdateUI();document.getElementById('swResultArea').classList.remove('show');document.getElementById('swUseBtn').classList.remove('show');}
function swShowResult(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);if(!t.endWall)return;document.getElementById('swResTotal').textContent=minsLabel(t.elapsed);document.getElementById('swResStart').textContent=fmtClock(t.startWall);document.getElementById('swResEnd').textContent=fmtClock(t.endWall);document.getElementById('swResultArea').classList.add('show');document.getElementById('swUseBtn').classList.add('show');}
function swUpdateUI(){if(!swCtx)return;const t=getTmr(swCtx.spotId,swCtx.field);const btn=document.getElementById('swStartBtn');if(!btn)return;if(t.running){btn.className='sw-ctrl-btn sw-stop';btn.textContent='⏹ 停止';document.getElementById('swResultArea').classList.remove('show');document.getElementById('swUseBtn').classList.remove('show');}else{btn.className='sw-ctrl-btn sw-start';btn.textContent=t.elapsed>0?'▶ 繼續':'▶ 開始';if(t.elapsed>0&&t.endWall)swShowResult();}}
function swApply(){if(!swCtx)return;const{spotId,field}=swCtx;const t=getTmr(spotId,field);const s=findSpot(spotId);if(s){if(field==='dur')s.durText=minsLabel(t.elapsed);else s.tr=`${minsLabel(t.elapsed)}（${fmtClock(t.startWall)}－${fmtClock(t.endWall)}）`;}closeO('swModal');recard(spotId);showToast('已套用 ✓');}
function openSw(spotId,field){swCtx={spotId,field};document.getElementById('swTypeLabel').textContent=field==='dur'?'Duration Stopwatch':'Transit Stopwatch';swTickModal();swUpdateUI();openO('swModal');}

/* ── UTILS ── */
function openO(id){const o=document.getElementById(id);o.classList.add('open');o.onclick=ev=>{if(ev.target===o)closeO(id);};}
function closeO(id){document.getElementById(id).classList.remove('open');}
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}

render();

// ── Firebase 同步 ──────────────────────────────────────
(async () => {
  try {
    // Lazy-load Firebase config
    const fb = await import('./firebase-config.js');
    // Read uid from localStorage (set by index.html after Google login)
    let uid = null;
    try { uid = localStorage.getItem('tripApp_uid'); } catch(e) {}
    if (!uid) throw new Error('未登入，跳過 Firebase 同步');
    const DOC_PATH = `users/${uid}/data/itinerary`;

    // Upload helper exposed globally for confirmSpot
    window._fbUpload = fb.uploadImage;

    // Save entire S (strip runtime-only fields)
    window._fbSave = async () => {
      const data = {
        title: S.title,
        days: S.days.map(d => ({
          ...d,
          spots: d.spots.map(s => ({
            id:s.id, name:s.name, cat:s.cat, time:s.time,
            dur:s.dur, durText:s.durText||'', addr:s.addr||'',
            phone:s.phone||'', note:s.note||'', tr:s.tr||'',
            img:s.img||null, detail:false
          }))
        })),
        nid: S.nid
      };
      await fb.fsSet(DOC_PATH, data);
    };

    // Load from Firestore
    const snap = await fb.fsGet(DOC_PATH);
    if (snap.exists()) {
      const d = snap.data();
      S.title = d.title || S.title;
      S.days  = d.days  || S.days;
      S.nid   = d.nid   || S.nid;
      render();
      document.getElementById('tripTitleText').textContent = S.title;
    }

    // Auto-save on every state-changing action
    // Patch key mutating functions to auto-save
    const origRender = window.render;
    let _saveTimer;
    window.render = function() {
      origRender();
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => window._fbSave && window._fbSave(), 800);
    };

    // Show sync badge
    const badge = document.createElement('div');
    badge.id = 'sync-badge';
    badge.style.cssText = 'position:fixed;top:10px;right:12px;z-index:9999;background:rgba(255,255,255,.9);border:1px solid #DDD4C6;border-radius:20px;padding:4px 10px;font-size:10px;font-family:sans-serif;color:#8B5E3C;font-weight:700;backdrop-filter:blur(8px);';
    badge.textContent = '☁ 已連線';
    document.body.appendChild(badge);

  } catch(e) {
    console.warn('Firebase 未設定，使用本機模式', e.message);
    window._fbSave = null;
    window._fbUpload = null;
  }
})();
</script>

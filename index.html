<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8B5E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅遊手帳">
<title>旅遊手帳</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #F0EBE3; overflow: hidden;
    font-family: 'Noto Sans TC', sans-serif; }

  /* ══ APP SHELL ══════════════════════════════════════ */
  #app-shell {
    display: flex; flex-direction: column;
    height: 100dvh; max-width: 430px; margin: 0 auto;
    background: #F7F3EE;
    box-shadow: 0 0 60px rgba(0,0,0,0.10);
    overflow: hidden; position: relative;
  }

  /* ══ LOGIN SCREEN ════════════════════════════════════ */
  #login-screen {
    position: absolute; inset: 0; z-index: 200;
    background: #F7F3EE;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #login-screen.hiding {
    opacity: 0;
    transform: translateY(-24px);
    pointer-events: none;
  }
  #login-screen.hidden { display: none; }

  /* decorative top border */
  #login-screen::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8B5E3C 0%, #C4956A 50%, #8B5E3C 100%);
  }

  /* stamp / logo area */
  .login-stamp {
    width: 88px; height: 88px;
    border: 2.5px solid #8B5E3C;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    position: relative;
    background: #FDFAF6;
    box-shadow: 0 4px 24px rgba(139,94,60,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .login-stamp::after {
    content: '';
    position: absolute; inset: 5px;
    border: 1px dashed #C4956A;
    border-radius: 50%;
    opacity: 0.6;
  }
  .login-stamp-emoji {
    font-size: 38px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(139,94,60,0.2));
  }

  .login-subtitle {
    font-size: 10px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: #A8917A; margin-bottom: 8px;
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 30px; font-weight: 900;
    color: #2C2016;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }
  .login-desc {
    font-size: 13px; color: #8B7355;
    text-align: center; line-height: 1.6;
    margin-bottom: 44px;
  }

  /* divider line with text */
  .login-divider {
    display: flex; align-items: center; gap: 12px;
    width: 100%; margin-bottom: 20px;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: #DDD4C6;
  }
  .login-divider span {
    font-size: 11px; color: #A8917A; font-weight: 600;
    letter-spacing: 1px; white-space: nowrap;
  }

  /* Google button */
  .btn-google {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 15px 20px;
    background: #fff;
    border: 1.5px solid #DDD4C6;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px; font-weight: 700;
    color: #2C2016;
    margin-bottom: 14px;
    transition: all 0.18s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    position: relative; overflow: hidden;
  }
  .btn-google::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(139,94,60,0.04) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.18s;
  }
  .btn-google:active { transform: scale(0.98); box-shadow: none; }
  .btn-google:active::before { opacity: 1; }
  .btn-google svg { flex-shrink: 0; }

  /* offline button */
  .btn-offline {
    width: 100%;
    padding: 13px 20px;
    background: transparent;
    border: 1.5px solid #DDD4C6;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #A8917A;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-offline:active { background: #F0EBE3; color: #6B4428; border-color: #C4956A; }

  /* offline warning badge */
  .offline-note {
    margin-top: 14px;
    font-size: 11px; color: #B09070;
    text-align: center; line-height: 1.5;
  }

  /* loading state on button */
  .btn-google.loading, .btn-offline.loading {
    opacity: 0.6; pointer-events: none;
  }
  .btn-google.loading::after {
    content: '';
    width: 16px; height: 16px;
    border: 2px solid #DDD4C6; border-top-color: #8B5E3C;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-left: 8px;
  }

  /* error message */
  .login-error {
    background: #FEF2F2; border: 1px solid #FCA5A5;
    border-radius: 10px; padding: 10px 14px;
    font-size: 12px; color: #DC2626;
    margin-bottom: 14px; text-align: center;
    display: none;
  }
  .login-error.show { display: block; }

  /* user info bar (shown when logged in, for logout) */
  #user-bar {
    display: none;
    position: absolute; top: 0; left: 0; right: 0; z-index: 50;
    background: #FDFAF6;
    border-bottom: 1px solid #DDD4C6;
    padding: 10px 16px;
    flex-shrink: 0;
    align-items: center; justify-content: space-between;
  }
  #user-bar.visible { display: flex; }
  .user-bar-info { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #8B5E3C, #C4956A);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: 700;
    overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name { font-size: 12px; font-weight: 700; color: #4A3728; }
  .user-mode { font-size: 10px; color: #A8917A; }
  .btn-logout {
    font-size: 11px; color: #A8917A; font-weight: 600;
    background: none; border: 1px solid #DDD4C6;
    border-radius: 8px; padding: 4px 10px; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .btn-logout:active { background: #F0EBE3; color: #6B4428; }

  /* ══ IFRAME SECTION ══════════════════════════════════ */
  #main-area {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; opacity: 0;
    transition: opacity 0.4s ease 0.1s;
  }
  #main-area.visible { opacity: 1; }

  #iframe-wrap { flex: 1; position: relative; overflow: hidden; }

  .page-iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none; display: none; background: #F7F3EE;
  }
  .page-iframe.active { display: block; }

  /* ══ BOTTOM NAV ═══════════════════════════════════════ */
  #bottom-nav {
    flex-shrink: 0; display: flex; align-items: stretch;
    background: #FDFAF6; border-top: 1.5px solid #DDD4C6;
    padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    padding: 10px 4px 11px; background: none; border: none;
    cursor: pointer; color: #A8917A;
    font-family: 'Noto Sans TC', sans-serif;
    transition: color 0.18s; position: relative; outline: none;
  }
  .nav-btn::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 0; height: 2.5px;
    background: #8B5E3C; border-radius: 0 0 3px 3px;
    transition: width 0.22s cubic-bezier(.4,0,.2,1);
  }
  .nav-btn.active { color: #6B4428; }
  .nav-btn.active::before { width: 40px; }
  .nav-icon { font-size: 20px; line-height: 1; transition: transform 0.18s; }
  .nav-btn.active .nav-icon { transform: translateY(-1px) scale(1.1); }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }

  /* loading spinner */
  .iframe-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #F7F3EE; gap: 12px;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s; z-index: 10;
  }
  .iframe-loading.show { opacity: 1; }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2.5px solid #DDD4C6; border-top-color: #8B5E3C;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: #A8917A; font-weight: 600; letter-spacing: 1px; }

  /* ══ OFFLINE BANNER ══════════════════════════════════ */
  #offline-banner {
    display: none;
    background: #FEF9EE; border-bottom: 1px solid #F0D9A0;
    padding: 7px 16px;
    font-size: 11px; color: #8B6914; font-weight: 600;
    text-align: center; letter-spacing: 0.3px;
  }
  #offline-banner.show { display: block; }
</style>
</head>
<body>
<div id="app-shell">

  <!-- ══ LOGIN SCREEN ══════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-stamp">
      <span class="login-stamp-emoji">✈️</span>
    </div>
    <div class="login-subtitle">Travel Journal</div>
    <div class="login-title">旅遊手帳</div>
    <div class="login-desc">記錄每段旅程的美好時光</div>

    <div style="width:100%">
      <div class="login-error" id="login-error"></div>

      <div class="login-divider"><span>登入以同步資料</span></div>

      <button class="btn-google" id="btn-google" onclick="handleGoogleLogin()">
        <!-- Google SVG icon -->
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.5 5.9l.1-.1 6.2 5.2C36.9 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        使用 Google 帳號登入
      </button>

      <button class="btn-offline" id="btn-offline" onclick="handleOfflineMode()">
        📴 離線使用（資料只存本機）
      </button>

      <div class="offline-note">離線模式下資料不會跨裝置同步<br>隨時可登入 Google 帳號開始同步</div>
    </div>
  </div>

  <!-- ══ MAIN APP ═══════════════════════════════════════ -->
  <div id="main-area">

    <!-- 離線提示橫幅 -->
    <div id="offline-banner">📴 離線模式 — 資料僅存於本機</div>

    <!-- 使用者資訊列 -->
    <div id="user-bar">
      <div class="user-bar-info">
        <div class="user-avatar" id="user-avatar">？</div>
        <div>
          <div class="user-name" id="user-name">使用者</div>
          <div class="user-mode" id="user-mode">☁ 雲端同步</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">登出</button>
    </div>

    <!-- iFrame 頁面區 -->
    <div id="iframe-wrap">
      <div class="iframe-loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">載入中…</div>
      </div>
      <iframe class="page-iframe active" id="frame-itinerary" src="itinerary.html" title="行程"></iframe>
      <iframe class="page-iframe" id="frame-timeline"  src="" title="時間軸"></iframe>
      <iframe class="page-iframe" id="frame-budget"    src="" title="記帳"></iframe>
      <iframe class="page-iframe" id="frame-wishlist"  src="" title="清單"></iframe>
      <iframe class="page-iframe" id="frame-packing"   src="" title="行李"></iframe>
    </div>

    <!-- 底部導航 -->
    <nav id="bottom-nav">
      <button class="nav-btn active" onclick="switchPage('itinerary')" id="nav-itinerary">
        <span class="nav-icon">🗺</span><span class="nav-label">行程</span>
      </button>
      <button class="nav-btn" onclick="switchPage('timeline')" id="nav-timeline">
        <span class="nav-icon">📖</span><span class="nav-label">時間軸</span>
      </button>
      <button class="nav-btn" onclick="switchPage('budget')" id="nav-budget">
        <span class="nav-icon">💰</span><span class="nav-label">記帳</span>
      </button>
      <button class="nav-btn" onclick="switchPage('wishlist')" id="nav-wishlist">
        <span class="nav-icon">✨</span><span class="nav-label">清單</span>
      </button>
      <button class="nav-btn" onclick="switchPage('packing')" id="nav-packing">
        <span class="nav-icon">🧳</span><span class="nav-label">行李</span>
      </button>
    </nav>
  </div>

</div><!-- /app-shell -->

<script type="module">
// ── Page navigation ───────────────────────────────────
const PAGE_SRCS = {
  itinerary: 'itinerary.html',
  timeline:  'timeline.html',
  budget:    'budget.html',
  wishlist:  'wishlist.html',
  packing:   'packing.html',
};
let currentPage = 'itinerary';
const loaded = new Set(['itinerary']);

function showLoading() { document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

window.switchPage = function(pageId) {
  if (pageId === currentPage) return;
  document.getElementById('nav-' + currentPage).classList.remove('active');
  document.getElementById('frame-' + currentPage).classList.remove('active');
  document.getElementById('nav-' + pageId).classList.add('active');
  const frame = document.getElementById('frame-' + pageId);
  frame.classList.add('active');
  if (!loaded.has(pageId)) {
    loaded.add(pageId);
    showLoading();
    frame.onload = hideLoading;
    setTimeout(hideLoading, 4000);
    frame.src = PAGE_SRCS[pageId];
  }
  currentPage = pageId;
  try { localStorage.setItem('tripApp_lastPage', pageId); } catch(e) {}
};

// ── Restore last tab ──────────────────────────────────
function restoreLastTab() {
  try {
    const last = localStorage.getItem('tripApp_lastPage');
    if (last && PAGE_SRCS[last] && last !== 'itinerary') switchPage(last);
  } catch(e) {}
}

// ── Show main app after login ─────────────────────────
function showApp(user, isOffline = false) {
  // Update user bar
  const bar = document.getElementById('user-bar');
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name');
  const modeEl = document.getElementById('user-mode');

  if (isOffline) {
    document.getElementById('offline-banner').classList.add('show');
    nameEl.textContent = '訪客';
    modeEl.textContent = '📴 離線模式';
    avatar.textContent = '👤';
    document.getElementById('btn-logout').textContent = '切換帳號';
  } else {
    nameEl.textContent = user.displayName || user.email || '使用者';
    modeEl.textContent = '☁ 雲端同步';
    if (user.photoURL) {
      avatar.innerHTML = `<img src="${user.photoURL}" alt="">`;
    } else {
      avatar.textContent = (user.displayName || 'U')[0].toUpperCase();
    }
  }
  bar.classList.add('visible');

  // Hide login screen with animation
  const loginScreen = document.getElementById('login-screen');
  loginScreen.classList.add('hiding');
  setTimeout(() => loginScreen.classList.add('hidden'), 500);

  // Show main area
  const mainArea = document.getElementById('main-area');
  mainArea.style.display = 'flex';
  setTimeout(() => mainArea.classList.add('visible'), 50);

  restoreLastTab();
}

// ── Google Login ──────────────────────────────────────
window.handleGoogleLogin = async function() {
  const btn = document.getElementById('btn-google');
  const errEl = document.getElementById('login-error');
  btn.classList.add('loading');
  btn.textContent = '登入中…';
  errEl.classList.remove('show');

  try {
    const { signInWithGoogle, onAuthChange } = await import('./firebase-config.js');
    const user = await signInWithGoogle();
    try { localStorage.setItem('tripApp_authMode', 'google'); } catch(e) {}
    showApp(user, false);
  } catch(e) {
    console.error(e);
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.5 5.9l.1-.1 6.2 5.2C36.9 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>使用 Google 帳號登入`;

    let msg = '登入失敗，請再試一次';
    if (e.code === 'auth/popup-closed-by-user') msg = '登入視窗已關閉，請再試';
    if (e.code === 'auth/popup-blocked') msg = '彈出視窗被封鎖，請允許後再試';
    if (e.code === 'auth/network-request-failed') msg = '網路異常，請檢查連線';
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
};

// ── Offline Mode ──────────────────────────────────────
window.handleOfflineMode = function() {
  const btn = document.getElementById('btn-offline');
  btn.classList.add('loading');
  try { localStorage.setItem('tripApp_authMode', 'offline'); } catch(e) {}
  setTimeout(() => showApp(null, true), 300);
};

// ── Logout ────────────────────────────────────────────
window.handleLogout = async function() {
  try {
    const { logOut } = await import('./firebase-config.js');
    await logOut();
  } catch(e) {}
  // Reset state
  try { localStorage.removeItem('tripApp_authMode'); } catch(e) {}
  location.reload();
};

// ── Auto-login: check existing session ───────────────
(async function init() {
  // Check if user chose offline mode last time
  const authMode = localStorage.getItem('tripApp_authMode');
  if (authMode === 'offline') {
    showApp(null, true);
    return;
  }

  // Check if Firebase has an active session
  try {
    const { getCurrentUser } = await import('./firebase-config.js');
    const user = await Promise.race([
      getCurrentUser(),
      new Promise(resolve => setTimeout(() => resolve(null), 3000)) // 3s timeout
    ]);
    if (user && !user.isAnonymous) {
      // Already logged in with Google — skip login screen
      showApp(user, false);
      return;
    }
  } catch(e) {
    // Firebase failed (offline?) — show login screen normally
    console.warn('Firebase check failed:', e.message);
  }

  // Show login screen (no existing session)
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-area').style.display = 'none';
})();

// ── Network status banner ─────────────────────────────
window.addEventListener('offline', () => {
  document.getElementById('offline-banner').classList.add('show');
  document.getElementById('user-mode').textContent = '📴 目前離線';
});
window.addEventListener('online', () => {
  const authMode = localStorage.getItem('tripApp_authMode');
  if (authMode !== 'offline') {
    document.getElementById('offline-banner').classList.remove('show');
    document.getElementById('user-mode').textContent = '☁ 雲端同步';
  }
});

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('./sw.js').catch(() => {})
  );
}
</script>
</body>
</html>

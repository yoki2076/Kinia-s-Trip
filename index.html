<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8B5E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅遊手帳">
<title>旅遊手帳</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- Firebase compat SDK（與 Kinia's Planner 相同） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #F0EBE3; overflow: hidden;
    font-family: 'Noto Sans TC', sans-serif; }

  #app-shell {
    display: flex; flex-direction: column;
    height: 100dvh; max-width: 430px; margin: 0 auto;
    background: #F7F3EE;
    box-shadow: 0 0 60px rgba(0,0,0,0.10);
    overflow: hidden; position: relative;
  }

  /* ══ LOGIN SCREEN ════════════════════════════════════ */
  #login-screen {
    position: absolute; inset: 0; z-index: 200;
    background: #F7F3EE;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #login-screen.hiding { opacity: 0; transform: translateY(-24px); pointer-events: none; }
  #login-screen.hidden { display: none; }
  #login-screen::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #8B5E3C 0%, #C4956A 50%, #8B5E3C 100%);
  }
  .login-stamp {
    width: 88px; height: 88px; border: 2.5px solid #8B5E3C; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px; position: relative; background: #FDFAF6;
    box-shadow: 0 4px 24px rgba(139,94,60,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .login-stamp::after {
    content: ''; position: absolute; inset: 5px;
    border: 1px dashed #C4956A; border-radius: 50%; opacity: 0.6;
  }
  .login-stamp-emoji { font-size: 38px; line-height: 1; }
  .login-subtitle { font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #A8917A; margin-bottom: 8px; }
  .login-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; color: #2C2016; letter-spacing: -0.5px; margin-bottom: 6px; text-align: center; }
  .login-desc { font-size: 13px; color: #8B7355; text-align: center; line-height: 1.6; margin-bottom: 44px; }
  .login-divider { display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 20px; }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #DDD4C6; }
  .login-divider span { font-size: 11px; color: #A8917A; font-weight: 600; letter-spacing: 1px; }
  .btn-google {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 15px 20px; background: #fff; border: 1.5px solid #DDD4C6; border-radius: 14px;
    cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700;
    color: #2C2016; transition: all 0.18s; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .btn-google:active { transform: scale(0.98); background: #F7F3EE; }
  .btn-google.loading { opacity: 0.6; pointer-events: none; }
  .login-error {
    background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 10px; padding: 10px 14px;
    font-size: 12px; color: #DC2626; margin-bottom: 14px; text-align: center; display: none;
  }
  .login-error.show { display: block; }

  /* ══ SIDE DRAWER ═════════════════════════════════════ */
  #drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
    transition: opacity 0.25s;
  }
  #drawer-overlay.open { display: block; }

  #side-drawer {
    position: fixed; top: 0; left: 50%;
    transform: translateX(-430px); /* off-screen left (relative to app center) */
    width: 280px; height: 100dvh; z-index: 301;
    background: #FDFAF6;
    border-right: 1px solid #DDD4C6;
    display: flex; flex-direction: column;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 24px rgba(0,0,0,0.12);
    max-width: 280px;
  }
  /* When app is centered, drawer needs to align with app left edge */
  @media (min-width: 430px) {
    #side-drawer { left: calc(50% - 215px); transform: translateX(-280px); }
    #side-drawer.open { transform: translateX(0); }
  }
  #side-drawer.open { transform: translateX(calc(-50vw + 50%)); }

  /* Simpler approach: fixed position relative to viewport */
  #side-drawer {
    position: fixed; top: 0; left: 0;
    transform: translateX(-100%);
    width: min(280px, 75vw); height: 100dvh; z-index: 301;
    background: #FDFAF6; border-right: 1px solid #DDD4C6;
    display: flex; flex-direction: column;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 24px rgba(0,0,0,0.12);
  }
  #side-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 52px 20px 20px;
    background: linear-gradient(160deg, #6B4428 0%, #8B5E3C 100%);
    flex-shrink: 0;
  }
  .drawer-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff; font-weight: 700;
    overflow: hidden; margin-bottom: 12px;
  }
  .drawer-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .drawer-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .drawer-mode { font-size: 11px; color: rgba(255,255,255,0.75); }

  .drawer-body { flex: 1; padding: 12px 0; overflow-y: auto; }
  .drawer-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #A8917A;
    padding: 8px 20px 4px;
  }
  .drawer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 20px; font-size: 14px; font-weight: 600;
    color: #4A3728; cursor: pointer;
    transition: background 0.15s;
    border: none; background: none; width: 100%; text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .drawer-item:active { background: #F0EBE3; }
  .drawer-item-icon { font-size: 18px; width: 24px; text-align: center; }
  .drawer-divider { height: 1px; background: #EEE8E0; margin: 8px 0; }

  .drawer-footer { padding: 16px 20px; border-top: 1px solid #EEE8E0; flex-shrink: 0; }
  .btn-logout-drawer {
    width: 100%; padding: 11px; border-radius: 10px;
    border: 1.5px solid #DDD4C6; background: transparent;
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px;
    font-weight: 700; color: #A8917A; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-logout-drawer:active { background: #F0EBE3; color: #6B4428; border-color: #C4956A; }

  /* ══ MAIN AREA ═══════════════════════════════════════ */
  #main-area {
    flex: 1; display: none; flex-direction: column;
    overflow: hidden; opacity: 0; transition: opacity 0.4s ease 0.1s;
  }
  #main-area.visible { opacity: 1; }

  #iframe-wrap { flex: 1; position: relative; overflow: hidden; }
  .page-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: #F7F3EE; }
  .page-iframe.active { display: block; }

  /* ══ BOTTOM NAV ═══════════════════════════════════════ */
  #bottom-nav {
    flex-shrink: 0; display: flex; align-items: stretch;
    background: #FDFAF6; border-top: 1.5px solid #DDD4C6;
    padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
  }

  /* Menu button on the left of bottom nav */
  #menu-btn {
    flex-shrink: 0; width: 52px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    padding: 10px 4px 11px; background: none; border: none; border-right: 1px solid #EEE8E0;
    cursor: pointer; color: #A8917A; outline: none;
  }
  #menu-btn:active { background: #F0EBE3; }
  #menu-btn .bar { width: 16px; height: 1.5px; background: currentColor; border-radius: 2px; transition: all 0.2s; }

  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    padding: 10px 4px 11px; background: none; border: none;
    cursor: pointer; color: #A8917A; font-family: 'Noto Sans TC', sans-serif;
    transition: color 0.18s; position: relative; outline: none;
  }
  .nav-btn::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 0; height: 2.5px;
    background: #8B5E3C; border-radius: 0 0 3px 3px;
    transition: width 0.22s cubic-bezier(.4,0,.2,1);
  }
  .nav-btn.active { color: #6B4428; }
  .nav-btn.active::before { width: 40px; }
  .nav-icon { font-size: 20px; line-height: 1; transition: transform 0.18s; }
  .nav-btn.active .nav-icon { transform: translateY(-1px) scale(1.1); }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }

  .iframe-loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #F7F3EE; gap: 12px;
    pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10;
  }
  .iframe-loading.show { opacity: 1; }
  .loading-spinner { width: 28px; height: 28px; border: 2.5px solid #DDD4C6; border-top-color: #8B5E3C; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: #A8917A; font-weight: 600; letter-spacing: 1px; }

  #offline-banner.show { display: block; }
</style>
</head>
<body>
<div id="app-shell">

  <!-- ══ LOGIN SCREEN ══════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-stamp"><span class="login-stamp-emoji">✈️</span></div>
    <div class="login-subtitle">Travel Journal</div>
    <div class="login-title">旅遊手帳</div>
    <div class="login-desc">記錄每段旅程的美好時光</div>
    <div style="width:100%">
      <div class="login-error" id="login-error"></div>
      <div class="login-divider"><span>請登入以繼續</span></div>
      <button class="btn-google" id="btn-google" onclick="window._googleLogin()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.5 5.9l.1-.1 6.2 5.2C36.9 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <button onclick="window._guestLogin()" style="
        background: none;
        border: 1px solid rgba(139,94,60,0.3);
        color: var(--fog, #A8917A);
        border-radius: 12px;
        padding: 13px 24px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        width: 100%;
        margin-top: 8px;
        transition: background 0.15s;
      ">訪客模式（不同步）</button>
    </div>
  </div>

  <!-- ══ SIDE DRAWER ════════════════════════════════════ -->
  <div id="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="side-drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawer-avatar">？</div>
      <div class="drawer-name" id="drawer-name">使用者</div>
      <div class="drawer-mode" id="drawer-mode">☁ 雲端同步</div>
      <div id="offline-banner" style="display:none;margin-top:8px;background:#FEF9EE;border:1px solid #F0D9A0;border-radius:8px;padding:6px 10px;font-size:11px;color:#8B6914;font-weight:600;text-align:center;">📴 目前離線</div>
    </div>
    <div class="drawer-body">
      <div class="drawer-section-label">頁面</div>
      <button class="drawer-item" onclick="switchPage('itinerary');closeDrawer()">
        <span class="drawer-item-icon">🗺</span>行程
      </button>
      <button class="drawer-item" onclick="switchPage('timeline');closeDrawer()">
        <span class="drawer-item-icon">📖</span>時間軸
      </button>
      <button class="drawer-item" onclick="switchPage('budget');closeDrawer()">
        <span class="drawer-item-icon">💰</span>記帳
      </button>
      <button class="drawer-item" onclick="switchPage('wishlist');closeDrawer()">
        <span class="drawer-item-icon">✨</span>收藏
      </button>
      <button class="drawer-item" onclick="switchPage('packing');closeDrawer()">
        <span class="drawer-item-icon">🧳</span>行李清單
      </button>
    </div>
    <div class="drawer-footer">
      <button class="btn-logout-drawer" onclick="handleLogout()">登出</button>
    </div>
  </div>

  <!-- ══ MAIN APP ═══════════════════════════════════════ -->
  <div id="main-area">
    <div id="iframe-wrap">
      <div class="iframe-loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">載入中…</div>
      </div>
      <iframe class="page-iframe active" id="frame-itinerary" src="itinerary.html" title="行程"></iframe>
      <iframe class="page-iframe" id="frame-timeline"  src="" title="時間軸"></iframe>
      <iframe class="page-iframe" id="frame-budget"    src="" title="記帳"></iframe>
      <iframe class="page-iframe" id="frame-wishlist"  src="" title="清單"></iframe>
      <iframe class="page-iframe" id="frame-packing"   src="" title="行李"></iframe>
    </div>

    <nav id="bottom-nav">
      <!-- Hamburger menu button -->
      <button id="menu-btn" onclick="openDrawer()" aria-label="選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </button>
      <button class="nav-btn active" onclick="switchPage('itinerary')" id="nav-itinerary">
        <span class="nav-icon">🗺</span><span class="nav-label">行程</span>
      </button>
      <button class="nav-btn" onclick="switchPage('timeline')" id="nav-timeline">
        <span class="nav-icon">📖</span><span class="nav-label">時間軸</span>
      </button>
      <button class="nav-btn" onclick="switchPage('budget')" id="nav-budget">
        <span class="nav-icon">💰</span><span class="nav-label">記帳</span>
      </button>
      <button class="nav-btn" onclick="switchPage('wishlist')" id="nav-wishlist">
        <span class="nav-icon">✨</span><span class="nav-label">收藏</span>
      </button>
      <button class="nav-btn" onclick="switchPage('packing')" id="nav-packing">
        <span class="nav-icon">🧳</span><span class="nav-label">行李</span>
      </button>
    </nav>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// Firebase 設定（compat SDK，與 Kinia's Planner 相同模式）
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBtyJygjNYtDVV5wybC14subUh0teleH7k",
  authDomain:        "kinia-s-trip.firebaseapp.com",
  projectId:         "kinia-s-trip",
  storageBucket:     "kinia-s-trip.firebasestorage.app",
  messagingSenderId: "881218070648",
  appId:             "1:881218070648:web:3520bbd30df7557ccb658d"
};

firebase.initializeApp(firebaseConfig);
const auth      = firebase.auth();
const firestore = firebase.firestore();

// ── Page switching ────────────────────────────────────
const PAGE_SRCS = { itinerary:'itinerary.html', timeline:'timeline.html', budget:'budget.html', wishlist:'wishlist.html', packing:'packing.html' };
let currentPage = 'itinerary';
const loaded = new Set(['itinerary']);

function showLoading() { document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

window.switchPage = function(pageId) {
  if (pageId === currentPage) return;
  document.getElementById('nav-' + currentPage).classList.remove('active');
  document.getElementById('frame-' + currentPage).classList.remove('active');
  document.getElementById('nav-' + pageId).classList.add('active');
  const frame = document.getElementById('frame-' + pageId);
  frame.classList.add('active');
  if (!loaded.has(pageId)) {
    loaded.add(pageId);
    showLoading();
    frame.onload = hideLoading;
    setTimeout(hideLoading, 4000);
    frame.src = PAGE_SRCS[pageId];
  }
  currentPage = pageId;
  try { localStorage.setItem('tripApp_lastPage', pageId); } catch(e) {}
};

// ── Drawer ────────────────────────────────────────────
window.openDrawer = function() {
  document.getElementById('side-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
};
window.closeDrawer = function() {
  document.getElementById('side-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
};

// ── Show main app ─────────────────────────────────────
function showApp(user) {
  const nameEl   = document.getElementById('drawer-name');
  const modeEl   = document.getElementById('drawer-mode');
  const avatarEl = document.getElementById('drawer-avatar');

  if (user) {
    nameEl.textContent = user.displayName || user.email || '使用者';
    modeEl.textContent = '☁ 雲端同步';
    if (user.photoURL) {
      avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
    } else {
      avatarEl.textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
    }
  } else {
    // 離線訪客模式
    nameEl.textContent = '訪客';
    modeEl.textContent = '📴 不同步';
    avatarEl.textContent = '👤';
  }

  // Animate out login screen
  const ls = document.getElementById('login-screen');
  ls.classList.add('hiding');
  setTimeout(() => ls.classList.add('hidden'), 500);

  // Show main area
  const ma = document.getElementById('main-area');
  ma.style.display = 'flex';
  setTimeout(() => ma.classList.add('visible'), 50);

  // Restore last tab
  try {
    const last = localStorage.getItem('tripApp_lastPage');
    if (last && PAGE_SRCS[last] && last !== 'itinerary') switchPage(last);
  } catch(e) {}
}

// ── Google Login ──────────────────────────────────────
// iOS PWA 不支援 signInWithPopup，一律改用 signInWithRedirect
// （桌面瀏覽器也能正常使用 redirect 流程）
window._googleLogin = function() {
  const btn   = document.getElementById('btn-google');
  const errEl = document.getElementById('login-error');
  btn.classList.add('loading');
  btn.textContent = '跳轉登入中…';
  errEl.classList.remove('show');

  const provider = new firebase.auth.GoogleAuthProvider();
  // redirect：離開頁面 → Google 登入 → 跳回來，由下方 getRedirectResult 接收結果
  auth.signInWithRedirect(provider).catch(function(e) {
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.5 5.9l.1-.1 6.2 5.2C36.9 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>使用 Google 帳號登入`;
    let msg = '登入失敗，請再試一次';
    if (e.code === 'auth/network-request-failed') msg = '網路異常，請檢查連線';
    errEl.textContent = msg;
    errEl.classList.add('show');
  });
};

// ── Redirect 回來後接收登入結果 ───────────────────────
// 頁面載入時檢查是否從 Google 登入跳回來
auth.getRedirectResult().catch(function(e) {
  // redirect 失敗（極少見）：顯示錯誤
  const errEl = document.getElementById('login-error');
  if (!errEl) return;
  let msg = '登入失敗，請再試一次';
  if (e.code === 'auth/network-request-failed') msg = '網路異常，請檢查連線';
  errEl.textContent = msg;
  errEl.classList.add('show');
});

// ── Logout ────────────────────────────────────────────
window.handleLogout = function() {
  if (!confirm('確定登出？')) return;
  auth.signOut().then(function() {
    try {
      localStorage.removeItem('tripApp_uid');
      localStorage.removeItem('tripApp_lastPage');
    } catch(e) {}
    location.reload();
  });
};

// ── 訪客模式（不同步）────────────────────────────────
window._guestLogin = function() {
  showApp(null);
};

// ── Auth 狀態監聽：登入後自動顯示 app ────────────────
// 核心邏輯：
//   1. 先檢查 localStorage 有沒有上次登入的 uid cache
//   2. 有的話「立刻」先顯示 app（不等 Firebase，解決 PWA 卡登入畫面問題）
//   3. onAuthStateChanged 確認後更新使用者資訊；若 Firebase 回報未登入則登出退回
let appShown = false;

// 步驟 1：localStorage 快速恢復（頁面一開啟就執行）
try {
  const cachedUid = localStorage.getItem('tripApp_uid');
  if (cachedUid) {
    // 有 cache → 直接先開 app，顯示暫時的佔位資訊
    appShown = true;
    showApp({ displayName: '', email: '', photoURL: null, uid: cachedUid, _cached: true });
  }
} catch(e) {}

// 步驟 2：Firebase 確認登入狀態
auth.onAuthStateChanged(function(user) {
  if (user) {
    // 登入成功：存 cache，更新使用者資訊
    try { localStorage.setItem('tripApp_uid', user.uid); } catch(e) {}
    if (!appShown) {
      appShown = true;
      showApp(user);
    } else {
      // 已先顯示 app，只需更新 drawer 使用者資訊
      const nameEl   = document.getElementById('drawer-name');
      const modeEl   = document.getElementById('drawer-mode');
      const avatarEl = document.getElementById('drawer-avatar');
      if (nameEl) nameEl.textContent = user.displayName || user.email || '使用者';
      if (modeEl) modeEl.textContent = '☁ 雲端同步';
      if (avatarEl) {
        if (user.photoURL) {
          avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
        } else {
          avatarEl.textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
        }
      }
    }
  } else {
    // Firebase 確認未登入：清除 cache，若已因 cache 開了 app 則退回登入畫面
    try { localStorage.removeItem('tripApp_uid'); } catch(e) {}
    if (appShown) {
      appShown = false;
      const ma = document.getElementById('main-area');
      const ls = document.getElementById('login-screen');
      if (ma) { ma.classList.remove('visible'); ma.style.display = 'none'; }
      if (ls) { ls.classList.remove('hiding'); ls.classList.remove('hidden'); }
    }
  }
});

// ── Network status ────────────────────────────────────
window.addEventListener('offline', function() {
  const banner = document.getElementById('offline-banner');
  if (banner) banner.classList.add('show');
  const mode = document.getElementById('drawer-mode');
  if (mode) mode.textContent = '📴 目前離線';
});
window.addEventListener('online', function() {
  const banner = document.getElementById('offline-banner');
  if (banner) banner.classList.remove('show');
  const mode = document.getElementById('drawer-mode');
  if (mode && auth.currentUser) mode.textContent = '☁ 雲端同步';
});

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  });
}
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的清單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F3EE;
    --surface: #FDFAF6;
    --surface2: #F0EBE3;
    --border: #DDD4C6;
    --accent: #8B5E3C;
    --accent2: #C4956A;
    --text: #2C2016;
    --text2: #6B5744;
    --red: #B04040;
    --green: #5A7A4A;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
  padding-bottom: 80px;
  padding-bottom:80px;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden;
  }

  /* ══════════════════════════════
     TOP PAGE SWITCHER
  ══════════════════════════════ */
  .page-switcher {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    padding: 48px 20px 0;
  }
  .page-tabs {
    display: flex; border-bottom: 2px solid var(--border);
  }
  .page-tab {
    flex: 1; text-align: center; padding: 10px 0 12px;
    font-size: 17px; font-weight: 600; color: var(--text2);
    cursor: pointer; position: relative;
    transition: color 0.2s; letter-spacing: 0.3px;
    border: none; background: none;
  }
  .page-tab.active { color: var(--accent); }
  .page-tab::after {
    content: ''; position: absolute; bottom: -2px; left: 20%; right: 20%;
    height: 2.5px; background: var(--accent); border-radius: 2px;
    transform: scaleX(0); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .page-tab.active::after { transform: scaleX(1); }

  /* ══════════════════════════════
     PAGES CONTAINER (slide)
  ══════════════════════════════ */
  .pages-wrap {
    width: 100%;
    overflow: hidden;
  }
  .pages-inner {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    width: 200%;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .page {
    width: 50%;
    flex-shrink: 0;
    min-width: 0;
  }

  /* ══════════════════════════════
     SHARED HEADER (per page)
  ══════════════════════════════ */
  .sub-header {
    padding: 14px 20px 14px;
    background: linear-gradient(180deg, #F0EBE3 0%, transparent 100%);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 8px; }
  .app-title { font-size: 26px; color: var(--accent); letter-spacing: 0.5px; }
  .header-btns { display: flex; gap: 8px; }
  .add-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; color: #fff;
    font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 700; transition: transform 0.15s; flex-shrink: 0;
  }
  .add-btn:active { transform: scale(0.9); }
  .cat-mgr-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, border-color 0.2s; flex-shrink: 0;
  }
  .cat-mgr-btn:active { transform: scale(0.9); border-color: var(--accent); }

  /* View tabs (全部/待買/已買/收藏 etc.) */
  .view-tabs {
    display: flex; gap: 6px; justify-content: center;
    margin: 10px 0 12px;
  }
  .vtab {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    color: var(--text2); cursor: pointer; border: 1px solid transparent;
    background: transparent; transition: all 0.2s; white-space: nowrap;
  }
  .vtab.active {
    background: var(--surface); color: var(--accent);
    border-color: var(--border); font-weight: 700;
    box-shadow: 0 1px 4px rgba(139,94,60,0.10);
  }

  /* Search */
  .search-bar { position: relative; margin-bottom: 12px; }
  .search-bar input {
    width: 100%; padding: 10px 16px 10px 38px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 15px; }

  /* Currency bar (wishlist only) */
  .currency-bar { display: flex; align-items: center; gap: 8px; padding: 0 0 10px; flex-wrap: wrap; }
  .currency-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .currency-chips { display: flex; gap: 5px; }
  .cur-chip {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 11px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif;
  }
  .cur-chip.active { background: var(--surface2); color: var(--accent2); border-color: var(--accent); font-weight: 700; }
  .rate-note { font-size: 10px; color: var(--text2); opacity: 0.6; }

  /* Category chips */
  .categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .categories::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

  /* Sort bar */
  .sort-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; font-size: 12px; color: var(--text2); }
  .sort-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
    font-size: 12px; font-family: 'Noto Sans TC', sans-serif; padding: 4px 8px; border-radius: 8px; outline: none; cursor: pointer;
  }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 0 10px; padding: 0 16px 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0; text-align: center; overflow: hidden; display: grid; grid-template-rows: subgrid; grid-row: span 2; align-items: center; justify-items: center; padding: 10px 4px; }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; line-height: 1; align-self: end; }
  .stat-num.stat-num-sm { font-size: 15px; }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 6px; line-height: 1; align-self: start; }

  /* Items list */
  .items-list { padding: 0 16px 40px; display: flex; flex-direction: column; gap: 12px; }
  @keyframes slideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ── Wishlist item card ── */
  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: flex;
    align-items: stretch; animation: slideIn 0.3s ease;
  }
  .item-card.bought { opacity: 0.5; }
  .item-card.bought .item-name { text-decoration: line-through; color: var(--text2); }
  .item-img { width: 90px; height: 90px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-body {
  padding-bottom:80px; flex: 1; padding: 12px; min-width: 0; }
  .item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .item-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; min-width: 0; word-break: break-word; }
  .item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    width: 28px; height: 28px; border: none; background: none;
    color: var(--text2); font-size: 14px; cursor: pointer;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: var(--surface2); }
  .icon-btn.check { color: var(--green); }
  .icon-btn.del { color: var(--red); }
  .item-source { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
  .item-note { font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .item-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .p-high { background: var(--red); } .p-mid { background: #ff9f43; } .p-low { background: var(--green); }
  .item-price-sale { font-size: 13px; color: var(--accent2); font-weight: 700; }
  .item-price-original { font-size: 11px; color: var(--text2); text-decoration: line-through; margin-left: 2px; }
  .item-price-orig { font-size: 10px; color: var(--text2); }
  .sale-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; background: #ff5c5c22; color: var(--red); margin-left: 2px; }

  /* ── Place card ── */
  .place-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    animation: slideIn 0.3s ease;
  }
  .place-card.visited { opacity: 0.55; }
  .place-card.visited .place-name { text-decoration: line-through; color: var(--text2); }
  .place-banner {
    width: 100%; height: 110px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .place-banner img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .place-banner-emoji { position: relative; z-index: 1; }
  .place-body {
  padding-bottom:80px; padding: 12px; }
  .place-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .place-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; min-width: 0; word-break: break-word; }
  .place-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .place-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .place-area { font-size: 11px; color: var(--accent); font-weight: 500; }
  .place-type-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .place-note { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .place-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .place-tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: var(--surface2); color: var(--text2); }
  .place-rating { display: flex; gap: 2px; }
  .star { font-size: 12px; color: var(--border); }
  .star.filled { color: #f5a623; }
  .place-visited-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 10px; border: 1px solid var(--border);
    background: none; color: var(--text2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s; white-space: nowrap; margin-left: auto;
  }
  .place-visited-btn.done { background: var(--green); color: white; border-color: var(--green); }

  /* Archive */
  .archive-section { margin-top: 8px; }
  .archive-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px; cursor: pointer; user-select: none;
    border-top: 1px solid var(--border);
  }
  .archive-header-left { display: flex; align-items: center; gap: 8px; }
  .archive-title { font-size: 13px; color: var(--text2); font-weight: 500; }
  .archive-count { font-size: 11px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
  .archive-chevron { font-size: 12px; color: var(--text2); transition: transform 0.25s; display: inline-block; }
  .archive-chevron.open { transform: rotate(180deg); }
  .archive-body {
  padding-bottom:80px; overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
  .archive-body.open { max-height: 9999px; }
  .archive-cats { display: flex; flex-direction: column; gap: 16px; }
  .archive-cat-label {
    font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase;
    padding: 0 2px 6px; display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .archive-items { display: flex; flex-direction: column; gap: 8px; }
  .archive-items .item-card { opacity: 0.65; }
  .archive-cat-total { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--accent2); opacity: 0.9; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; margin-bottom: 6px; color: var(--text); }

  /* ══════════════════════════════
     MODAL
  ══════════════════════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px; max-height: 92vh;
    overflow-y: auto; padding: 24px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif; padding: 12px 14px; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--surface2); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .price-input-row { display: flex; gap: 8px; }
  .price-input-row .form-input { flex: 1; }
  .currency-select-inline {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--accent2); font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; padding: 12px 10px; outline: none; cursor: pointer;
    transition: border-color 0.2s; flex-shrink: 0;
  }
  .currency-select-inline:focus { border-color: var(--accent); }
  .img-upload {
    width: 100%; height: 120px; background: var(--surface2);
    border: 2px dashed var(--border); border-radius: 12px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer; gap: 6px; font-size: 12px;
    color: var(--text2); transition: border-color 0.2s; overflow: hidden; position: relative;
  }
  .img-upload:hover { border-color: var(--accent); }
  .img-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .img-upload input { display: none; }
  .img-upload-icon { font-size: 28px; }
  .submit-btn {
    width: 100%; padding: 15px; background: var(--accent); border: none;
    border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer; margin-top: 8px; transition: transform 0.15s;
  }
  .submit-btn:active { transform: scale(0.97); }
  .cancel-btn {
    width: 100%; padding: 12px; background: none;
    border: 1px solid var(--border); border-radius: 14px;
    color: var(--text2); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; margin-top: 8px;
  }
  .tag-colors-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; }
  .color-dot.selected { border-color: white; transform: scale(1.2); }
  /* star picker (place modal) */
  .star-picker { display: flex; gap: 6px; margin-top: 4px; }
  .star-pick { font-size: 26px; cursor: pointer; transition: transform 0.1s; color: var(--border); }
  .star-pick.filled { color: #f5a623; }
  .star-pick:hover { transform: scale(1.2); }

  /* Category Manager */
  .cat-list-manage { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .cat-manage-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; transition: border-color 0.2s;
  }
  .cat-manage-row.drag-over { border-color: var(--accent); background: #c8a96e11; }
  .drag-handle { cursor: grab; color: var(--text2); font-size: 16px; flex-shrink: 0; user-select: none; }
  .cat-emoji-btn { font-size: 22px; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .cat-name-input { flex: 1; background: none; border: none; color: var(--text); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; outline: none; min-width: 0; }
  .cat-name-input::placeholder { color: var(--text2); }
  .cat-delete-btn {
    width: 26px; height: 26px; border-radius: 8px; background: none;
    border: 1px solid var(--border); color: var(--red); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .add-cat-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .add-cat-emoji {
    font-size: 22px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 12px; cursor: pointer; transition: border-color 0.2s; flex-shrink: 0;
  }
  .add-cat-emoji:hover { border-color: var(--accent); }
  .add-cat-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif; padding: 12px 14px; outline: none; transition: border-color 0.2s;
  }
  .add-cat-input:focus { border-color: var(--accent); }
  .add-cat-btn {
    width: 46px; height: 46px; border-radius: 12px; background: var(--accent);
    border: none; color: #fff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;
  }
  .add-cat-btn:active { transform: scale(0.92); }
  .cat-hint { font-size: 11px; color: var(--text2); margin-bottom: 16px; opacity: 0.8; }

  /* Emoji Picker */
  .emoji-picker-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; align-items: center; justify-content: center;
  }
  .emoji-picker-overlay.open { display: flex; }
  .emoji-picker { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 290px; }
  .emoji-picker-title { font-size: 14px; color: var(--text2); margin-bottom: 12px; font-weight: 500; }
  .emoji-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; }
  .emoji-opt { font-size: 24px; text-align: center; cursor: pointer; padding: 7px; border-radius: 10px; background: none; border: none; }
  .emoji-opt:active { background: var(--surface2); }
  .emoji-cancel { display: block; width: 100%; margin-top: 12px; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 12px; color: var(--text2); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; cursor: pointer; }

  /* ── Category picker (行程風格) ── */
  .cat-picker-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }
  .cat-pick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 4px 8px;
    border-radius: 12px;
    border: 1.5px solid #F0E8DC;
    background: #F7F3EE;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .cat-pick-btn.selected {
    border-color: #8B5E3C;
    background: rgba(139,94,60,0.1);
  }
  .cat-pick-btn:active { transform: scale(0.95); }
  .cat-pick-btn-emoji {
    font-size: 20px;
    line-height: 1;
    display: block;
    text-align: center;
  }
  .cat-pick-btn-label {
    font-size: 10px;
    color: #A8917A;

<script>
// ═══════════════════════════════════════════
// SHARED UTILS
// ═══════════════════════════════════════════
const COLORS = ['#7b61ff','#ff6b9d','#00d4aa','#ff9f43','#54a0ff','#a29bfe'];
function genId() { return Date.now()+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Shared emoji picker (one instance, used by both W and P)
let _emojiCallback = null;
const EMOJI_LIST_WISH = ['📱','💻','🖥','⌚','🎮','📷','🎧','🔋','💄','🧴','💊','🧖','👁','💅','🪥','🧼','🏠','🪑','🛁','🧺','🪴','🕯','🛋','🔧','👗','👟','👜','🎒','🧦','👒','🧤','💍','🍜','☕','🍰','🧃','🥗','🍱','🧋','🍫','📚','✏️','🎨','🎵','✈️','🏋️','🧸','🎁','📦','⭐'];
const EMOJI_LIST_PLACE = ['🍜','☕','🍰','🧃','🥗','🍱','🍣','🍕','🍔','🧋','🍫','🥐','🏠','🏯','⛩','🗼','🏖','🏔','🌿','🌸','🎡','🎭','🎨','🏛','🛍','💆','🎮','🎵','🍶','🍷','🧖','💈','🐾','🌊','🏕','🎪','📍','🗺','✈️','🚂','🚢','🛺','🏋️','🎯','🎠','🌙','⭐','📦'];

function openEmojiPickerShared(list, callback) {
  _emojiCallback = callback;
  document.getElementById('emojiGrid').innerHTML = list.map(e=>
    `<button class="emoji-opt" onclick="pickEmojiShared('${e}')">${e}</button>`).join('');
  document.getElementById('emojiPickerOverlay').classList.add('open');
}
function closeEmojiPicker() { document.getElementById('emojiPickerOverlay').classList.remove('open'); _emojiCallback=null; }
function pickEmojiShared(emoji) { if(_emojiCallback) _emojiCallback(emoji); closeEmojiPicker(); }

// Shared color picker helpers (each module has its own container id)
function renderColorPicker(containerId, sel) {
  document.getElementById(containerId).innerHTML = COLORS.map(c=>
    `<div class="color-dot ${c===sel?'selected':''}" style="background:${c}" onclick="selectColor('${containerId}','${c}')"></div>`
  ).join('');
}
function selectColor(containerId, c) { renderColorPicker(containerId, c); }
function getSelectedColor(containerId) {
  const d = document.querySelector(`#${containerId} .color-dot.selected`);
  return d ? d.style.background : COLORS[0];
}

// ═══════════════════════════════════════════
// PAGE SWITCHER
// ═══════════════════════════════════════════
let currentPage = 0;
function switchPage(idx) {
  currentPage = idx;
  document.getElementById('pagesInner').style.transform = `translateX(-${idx * 50}%)`;
  document.querySelectorAll('.page-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  if (idx===0) W.render();
  else P.render();
}

// ═══════════════════════════════════════════
// W  —  WISHLIST MODULE
// ═══════════════════════════════════════════
const W = (() => {
  const PRIORITY_MAP = {
    high:{label:'高',dot:'p-high',order:0},
    mid:{label:'中',dot:'p-mid',order:1},
    low:{label:'低',dot:'p-low',order:2}
  };
  const RATES = {
    TWD:{twdPer:1,symbol:'NT$',name:'台幣',hint:''},
    JPY:{twdPer:0.215,symbol:'¥',name:'日幣',hint:'1¥ ≈ NT$0.22'},
    KRW:{twdPer:0.024,symbol:'₩',name:'韓幣',hint:'1₩ ≈ NT$0.024'},
    USD:{twdPer:32,symbol:'$',name:'美金',hint:'1$ ≈ NT$32'},
  };

  let items = JSON.parse(localStorage.getItem('wishlist_items')||'[]');
  let categories = JSON.parse(localStorage.getItem('wishlist_cats')||'null') || [
    {id:'c1',name:'3C',icon:'📱'},{id:'c2',name:'美妝',icon:'💄'},
    {id:'c3',name:'家居',icon:'🏠'},{id:'c4',name:'服飾',icon:'👗'},
    {id:'c5',name:'食品',icon:'🍜'},{id:'c6',name:'書籍',icon:'📚'},{id:'c7',name:'其他',icon:'📦'},
  ];
  let displayCurrency = localStorage.getItem('wishlist_cur')||'TWD';
  let currentView='all', currentCat='全部', editingId=null, archiveOpen=false, uploadedImgData=null;
  let editingCats=[], dragSrcIdx=null, emojiTarget=null, pendingNewEmoji='📦';

  function saveItems() { localStorage.setItem('wishlist_items',JSON.stringify(items)); if(window._fbSave) window._fbSave(); }
  function saveCatsStore() { localStorage.setItem('wishlist_cats',JSON.stringify(categories)); if(window._fbSave) window._fbSave(); }
  function toTWD(price,cur) { return Number(price||0)*(RATES[cur||'TWD'].twdPer); }
  function fromTWD(twd,cur) { return twd/(RATES[cur||'TWD'].twdPer); }
  function fmtPrice(price,origCur,showCur) {
    if(!price) return null;
    const sym=RATES[showCur].symbol;
    return `${sym}${Math.round(fromTWD(toTWD(price,origCur),showCur)).toLocaleString()}`;
  }

  function render() {
    renderCurrencyBar(); renderCats(); renderStats(); renderItems();
  }
  function renderCurrencyBar() {
    document.getElementById('wCurrencyChips').innerHTML=Object.keys(RATES).map(k=>
      `<button class="cur-chip ${k===displayCurrency?'active':''}" onclick="W.setCurrency('${k}')">${RATES[k].symbol} ${RATES[k].name}</button>`).join('');
    document.getElementById('wRateNote').textContent=RATES[displayCurrency].hint;
  }
  function renderCats() {
    const el=document.getElementById('wCatList');
    const all=['全部',...categories.map(c=>c.name)];
    if(!all.includes(currentCat)) currentCat='全部';
    el.innerHTML=all.map(name=>{
      const cat=categories.find(c=>c.name===name);
      return `<div class="cat-chip ${name===currentCat?'active':''}" onclick="W.setCat('${esc(name)}')">${cat?cat.icon:'✦'} ${esc(name)}</div>`;
    }).join('');
  }
  function renderStats() {
    const pending=items.filter(i=>!i.bought), bought=items.filter(i=>i.bought);
    const budgetTWD=pending.filter(i=>i.price).reduce((s,i)=>s+toTWD(i.price,i.currency),0);
    const budgetFull=fmtPrice(budgetTWD,'TWD',displayCurrency)||`NT$${budgetTWD>999?(budgetTWD/1000).toFixed(1)+'K':budgetTWD}`;
    const budgetStr=budgetFull?budgetFull.replace(/^[^0-9,]+/,''):'0';
    document.getElementById('wStatsRow').innerHTML=`
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-label">待買</div></div>
      <div class="stat-card"><div class="stat-num">${bought.length}</div><div class="stat-label">已買</div></div>
      <div class="stat-card"><div class="stat-num stat-num-sm">${budgetStr}</div><div class="stat-label">預算</div></div>`;
  }
  function getFiltered() {
    let list=[...items];
    const q=document.getElementById('wSearchInput').value.toLowerCase();
    if(currentView==='pending') list=list.filter(i=>!i.bought);
    if(currentView==='bought')  list=list.filter(i=>i.bought);
    if(currentView==='fav')     list=list.filter(i=>i.fav);
    if(currentCat!=='全部')     list=list.filter(i=>i.category===currentCat);
    if(q) list=list.filter(i=>i.name.toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q));
    const sort=document.getElementById('wSortSelect').value;
    if(sort==='price-asc')  list.sort((a,b)=>toTWD(a.price,a.currency)-toTWD(b.price,b.currency));
    else if(sort==='price-desc') list.sort((a,b)=>toTWD(b.price,b.currency)-toTWD(a.price,a.currency));
    else if(sort==='priority') list.sort((a,b)=>PRIORITY_MAP[a.priority].order-PRIORITY_MAP[b.priority].order);
    else if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
    else list.sort((a,b)=>b.createdAt-a.createdAt);
    return list;
  }
  function itemCardHTML(item) {
    const p=PRIORITY_MAP[item.priority]||PRIORITY_MAP.mid;
    const tagColor=item.tagColor||COLORS[0];
    const cat=categories.find(c=>c.name===item.category);
    const catIcon=cat?cat.icon:'📦';
    const priceDisplay=fmtPrice(item.price,item.currency||'TWD',displayCurrency);
    const hasOriginal=item.originalPrice&&Number(item.originalPrice)>Number(item.price||0);
    const originalDisplay=hasOriginal?fmtPrice(item.originalPrice,item.originalCurrency||item.currency||'TWD',displayCurrency):null;
    const discountPct=hasOriginal?Math.round((1-toTWD(item.price,item.currency)/toTWD(item.originalPrice,item.originalCurrency||item.currency))*100):null;
    const inputCur=item.currency||'TWD';
    const inputCurLabel=(priceDisplay&&inputCur!==displayCurrency)?`${RATES[inputCur].symbol}${Number(item.price).toLocaleString()}`:null;
    return `<div class="item-card ${item.bought?'bought':''}">
      <div class="item-img">${item.img?`<img src="${item.img}" alt="">`:catIcon}</div>
      <div class="item-body">
        <div class="item-header">
          <div class="item-name">${esc(item.name)}</div>
          <div class="item-actions">
            <button class="icon-btn" onclick="W.toggleFav('${item.id}')">${item.fav?'⭐':'☆'}</button>
            <button class="icon-btn check" onclick="W.toggleBought('${item.id}')">${item.bought?'↩️':'✓'}</button>
            <button class="icon-btn" onclick="W.openEditModal('${item.id}')">✏️</button>
            <button class="icon-btn del" onclick="W.deleteItem('${item.id}')">🗑</button>
          </div>
        </div>
        ${item.source?`<div class="item-source">🔗 ${esc(item.source)}</div>`:''}
        ${item.note?`<div class="item-note">${esc(item.note)}</div>`:''}
        <div class="item-footer">
          <div class="priority-dot ${p.dot}"></div>

  function renderItems() {
    const list=getFiltered();
    const el=document.getElementById('wItemsList');
    const pending=list.filter(i=>!i.bought), bought=list.filter(i=>i.bought);
    document.getElementById('wCountLabel').textContent=`${pending.length} 件待買`;
    if(!pending.length&&!bought.length){
      el.innerHTML=`<div class="empty"><div class="empty-icon">🛍️</div><div class="empty-title">清單是空的</div><div style="font-size:13px">點右上角 ＋ 新增想買的商品</div></div>`;
      return;
    }
    let html=pending.map(item=>itemCardHTML(item)).join('');
    if(bought.length){
      const grouped={};
      bought.forEach(item=>{ const k=item.category||'其他'; if(!grouped[k])grouped[k]=[]; grouped[k].push(item); });
      const groupKeys=categories.map(c=>c.name).filter(n=>grouped[n]);
      Object.keys(grouped).forEach(k=>{if(!groupKeys.includes(k))groupKeys.push(k);});
      const catGroupsHTML=groupKeys.map(key=>{
        const gi=grouped[key], cat=categories.find(c=>c.name===key), icon=cat?cat.icon:'📦';
        const totalTWD=gi.reduce((s,i)=>s+(i.price?toTWD(i.price,i.currency||'TWD'):0),0);

          <div class="archive-cat-label">
            <span>${icon} ${esc(key)}</span>
            <span style="opacity:0.5;font-weight:400">${gi.length} 件</span>
            ${totalStr?`<span class="archive-cat-total">${totalStr}</span>`:''}
          </div>
          <div class="archive-items">${gi.map(i=>itemCardHTML(i)).join('')}</div>
        </div>`;
      }).join('');
      const totalSpentTWD=bought.reduce((s,i)=>s+(i.price?toTWD(i.price,i.currency||'TWD'):0),0);
      const totalSpentStr=totalSpentTWD?fmtPrice(totalSpentTWD,'TWD',displayCurrency):null;

        <div class="archive-header" onclick="W.toggleArchive()">
          <div class="archive-header-left">
            <span style="font-size:16px">🗃</span>
            <span class="archive-title">已購買 Archive</span>
            <span class="archive-count">${bought.length}</span>
            ${totalSpentStr?`<span style="font-size:11px;color:var(--red);font-weight:700">共 ${totalSpentStr}</span>`:''}
          </div>
          <span class="archive-chevron ${archiveOpen?'open':''}">▼</span>
        </div>
        <div class="archive-body ${archiveOpen?'open':''}" id="wArchiveBody">
          <div class="archive-cats">${catGroupsHTML}</div>
        </div>
      </div>`;
    }
    el.innerHTML=html;
  }

  // ── Actions ──
  function setCurrency(c) { displayCurrency=c; localStorage.setItem('wishlist_cur',c); render(); if(window._fbSave) window._fbSave(); }
  function toggleBought(id) { const i=items.find(x=>x.id===id); if(i){i.bought=!i.bought;saveItems();render();} }
  function toggleFav(id) { const i=items.find(x=>x.id===id); if(i){i.fav=!i.fav;saveItems();render();} }
  function deleteItem(id) { if(!confirm('確定刪除？'))return; items=items.filter(x=>x.id!==id);saveItems();render(); }
  function setCat(c) { currentCat=c; render(); }
  function toggleArchive() {
    archiveOpen=!archiveOpen;
    const body=document.getElementById('wArchiveBody');
    const chev=document.querySelector('#wItemsList .archive-chevron');
    if(body) body.classList.toggle('open',archiveOpen);
    if(chev) chev.classList.toggle('open',archiveOpen);
  }
  function setView(v) {
    currentView=v;
    document.querySelectorAll('#wViewTabs .vtab').forEach((el,i)=>el.classList.toggle('active',['all','pending','bought','fav'][i]===v));
    render();
  }

  // ── Modal ──
  function populateCatSelect(sel) {
    document.getElementById('wfCategory').innerHTML=categories.map(c=>
      `<option value="${esc(c.name)}" ${c.name===sel?'selected':''}>${c.icon} ${esc(c.name)}</option>`).join('');

  function openAddModal() {
    editingId=null; uploadedImgData=null;
    document.getElementById('wModalTitle').textContent='新增商品';
    ['wfName','wfSource','wfNote','wfPrice','wfOriginalPrice'].forEach(id=>document.getElementById(id).value='');

    document.getElementById('wfOriginalCurrency').value='TWD';
    document.getElementById('wfPriority').value='mid';
    populateCatSelect(categories[0]?.name||'');
    document.getElementById('wImgUpload').innerHTML=`<span class="img-upload-icon">📷</span><span>點擊上傳圖片</span><input type="file" id="wImgFileInput" accept="image/*" onchange="W.handleImgUpload(event)">`;
    renderColorPicker('wTagColorsList',COLORS[0]);
    document.getElementById('wModalOverlay').classList.add('open');
  }
  function openEditModal(id) {
    const item=items.find(x=>x.id===id); if(!item)return;
    editingId=id; uploadedImgData=item.img||null;
    document.getElementById('wModalTitle').textContent='編輯商品';

    document.getElementById('wfSource').value=item.source||'';
    document.getElementById('wfNote').value=item.note||'';
    document.getElementById('wfPrice').value=item.price||'';
    document.getElementById('wfCurrency').value=item.currency||'TWD';
    document.getElementById('wfOriginalPrice').value=item.originalPrice||'';
    document.getElementById('wfOriginalCurrency').value=item.originalCurrency||item.currency||'TWD';
    document.getElementById('wfPriority').value=item.priority||'mid';

    imgEl.innerHTML=`<input type="file" id="wImgFileInput" accept="image/*" onchange="W.handleImgUpload(event)">`;
    if(item.img){const img=document.createElement('img');img.src=item.img;imgEl.appendChild(img);}
    else imgEl.innerHTML+=`<span class="img-upload-icon">📷</span><span>點擊上傳圖片</span>`;
    renderColorPicker('wTagColorsList',item.tagColor||COLORS[0]);
    document.getElementById('wModalOverlay').classList.add('open');
  }
  function closeModal() { document.getElementById('wModalOverlay').classList.remove('open'); }
  function handleImgUpload(e) {
    const file=e.target.files[0]; if(!file)return;
    if(file.size>2*1024*1024){alert('圖片請小於 2MB');return;}
    const r=new FileReader();
    r.onload=ev=>{
      uploadedImgData=ev.target.result;
      const el=document.getElementById('wImgUpload');
      el.innerHTML=`<input type="file" id="wImgFileInput" accept="image/*" onchange="W.handleImgUpload(event)">`;
      const img=document.createElement('img');img.src=uploadedImgData;el.appendChild(img);
    };
    r.readAsDataURL(file);
  }
  function saveItem() {
    const name=document.getElementById('wfName').value.trim();
    if(!name){alert('請輸入商品名稱');return;}
    const data={name,
      source:document.getElementById('wfSource').value.trim(),
      note:document.getElementById('wfNote').value.trim(),
      price:document.getElementById('wfPrice').value,
      currency:document.getElementById('wfCurrency').value,
      originalPrice:document.getElementById('wfOriginalPrice').value,
      originalCurrency:document.getElementById('wfOriginalCurrency').value,
      priority:document.getElementById('wfPriority').value,
      category:document.getElementById('wfCategory').value,
      tagColor:getSelectedColor('wTagColorsList'),
      img:uploadedImgData,
    };
    if(editingId){const idx=items.findIndex(x=>x.id===editingId);items[idx]={...items[idx],...data};}
    else items.unshift({id:genId(),createdAt:Date.now(),bought:false,fav:false,...data});

  // ── Cat Manager ──
  function openCatManager() {
    editingCats=categories.map(c=>({...c})); pendingNewEmoji='📦';
    document.getElementById('wNewCatEmojiBtn').textContent='📦';

    document.getElementById('wCatModalOverlay').classList.add('open');

    document.getElementById('wCatListManage').innerHTML=editingCats.map((c,i)=>`
      <div class="cat-manage-row" draggable="true" ondragstart="W.dragStart(${i})" ondragover="W.dragOver(event,${i})" ondrop="W.dragDrop(${i})" ondragleave="W.dragLeave(event)">
        <span class="drag-handle">☰</span>
        <button class="cat-emoji-btn" onclick="W.openEmojiPicker(${i})">${c.icon}</button>
        <input class="cat-name-input" value="${esc(c.name)}" oninput="W._editingCats()[${i}].name=this.value" maxlength="12" placeholder="分類名稱">
        <button class="cat-delete-btn" onclick="W.removeCat(${i})">✕</button>
      </div>`).join('');
  }
  function _editingCats() { return editingCats; }
  function addCategory() {
    const name=document.getElementById('wNewCatName').value.trim();
    if(!name){document.getElementById('wNewCatName').focus();return;}
    if(editingCats.find(c=>c.name===name)){alert('分類名稱已存在');return;}
    editingCats.push({id:genId(),name,icon:pendingNewEmoji});
    document.getElementById('wNewCatName').value=''; pendingNewEmoji='📦';
    document.getElementById('wNewCatEmojiBtn').textContent='📦';
    renderCatManageList();
  }
  function removeCat(i) {
    const name=editingCats[i].name;
    if(items.some(item=>item.category===name)&&!confirm(`「${name}」分類下有商品，確定刪除？`))return;
    editingCats.splice(i,1); renderCatManageList();
  }
  function saveCats() {
    const names=editingCats.map(c=>c.name.trim()).filter(Boolean);
    if(new Set(names).size!==names.length){alert('分類名稱不能重複');return;}
    if(!names.length){alert('至少需要一個分類');return;}
    categories=editingCats.filter(c=>c.name.trim());
    saveCatsStore(); closeCatModal(); render();
  }
  function dragStart(i){dragSrcIdx=i;}
  function dragOver(e,i){e.preventDefault();document.querySelectorAll('#wCatListManage .cat-manage-row').forEach((r,ri)=>r.classList.toggle('drag-over',ri===i));}
  function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
  function dragDrop(i){
    if(dragSrcIdx===null||dragSrcIdx===i){dragSrcIdx=null;return;}
    const m=editingCats.splice(dragSrcIdx,1)[0]; editingCats.splice(i,0,m); dragSrcIdx=null;
    document.querySelectorAll('#wCatListManage .cat-manage-row').forEach(r=>r.classList.remove('drag-over'));
    renderCatManageList();
  }
  function openEmojiPicker(target) {
    emojiTarget=target;
    openEmojiPickerShared(EMOJI_LIST_WISH, emoji=>{
      if(emojiTarget==='new'){pendingNewEmoji=emoji;document.getElementById('wNewCatEmojiBtn').textContent=emoji;}
      else if(typeof emojiTarget==='number'){editingCats[emojiTarget].icon=emoji;renderCatManageList();}
    });
  }

  // ── Init ──
  function init() {
    render();
  }

  function reload() {
    items = JSON.parse(localStorage.getItem('wishlist_items')||'[]');
    const savedCats = JSON.parse(localStorage.getItem('wishlist_cats')||'null');
    if (savedCats && savedCats.length) categories = savedCats;
    render();
  }
  return {render,setView,setCurrency,setCat,toggleBought,toggleFav,deleteItem,toggleArchive,
    openAddModal,openEditModal,closeModal,handleImgUpload,saveItem,
    openCatManager,closeCatModal,addCategory,removeCat,saveCats,openEmojiPicker,
    dragStart,dragOver,dragLeave,dragDrop,_editingCats,init,reload};
})();

// ═══════════════════════════════════════════
// P  —  PLACE MODULE

const P = (() => {
  let places = JSON.parse(localStorage.getItem('placelist_items')||'[]');
  let categories = JSON.parse(localStorage.getItem('placelist_cats')||'null') || [
    {id:'c1',name:'餐廳',icon:'🍜'},{id:'c2',name:'咖啡廳',icon:'☕'},
    {id:'c3',name:'甜點',icon:'🍰'},{id:'c4',name:'景點',icon:'🏯'},

  ];
  let currentView='all', currentCat='全部', editingId=null, archiveOpen=false, uploadedImgData=null, pendingRating=0;

  function savePlaces() { localStorage.setItem('placelist_items',JSON.stringify(places)); if(window._fbSavePlaces) window._fbSavePlaces(); }
  function saveCatsStore() { localStorage.setItem('placelist_cats',JSON.stringify(categories)); if(window._fbSavePlaces) window._fbSavePlaces(); }

  function render() { renderCats(); renderStats(); renderItems(); }
  function renderCats() {
    const el=document.getElementById('pCatList');
    const all=['全部',...categories.map(c=>c.name)];
    if(!all.includes(currentCat)) currentCat='全部';
    el.innerHTML=all.map(name=>{
      const cat=categories.find(c=>c.name===name);
      return `<div class="cat-chip ${name===currentCat?'active':''}" onclick="P.setCat('${esc(name)}')">${cat?cat.icon:'✦'} ${esc(name)}</div>`;
    }).join('');
  }
  function renderStats() {
    const pending=places.filter(p=>!p.visited), visited=places.filter(p=>p.visited), favs=places.filter(p=>p.fav);
    document.getElementById('pStatsRow').innerHTML=`
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-label">想去</div></div>
      <div class="stat-card"><div class="stat-num">${visited.length}</div><div class="stat-label">去過</div></div>
      <div class="stat-card"><div class="stat-num">${favs.length}</div><div class="stat-label">收藏</div></div>`;
  }
  function getFiltered() {
    let list=[...places];
    const q=document.getElementById('pSearchInput').value.toLowerCase();
    if(currentView==='pending') list=list.filter(p=>!p.visited);
    if(currentView==='visited') list=list.filter(p=>p.visited);
    if(currentView==='fav')     list=list.filter(p=>p.fav);
    if(currentCat!=='全部')     list=list.filter(p=>p.category===currentCat);
    if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.area||'').toLowerCase().includes(q)||(p.note||'').toLowerCase().includes(q));
    const sort=document.getElementById('pSortSelect').value;
    if(sort==='rating') list.sort((a,b)=>(b.rating||0)-(a.rating||0));
    else if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
    else list.sort((a,b)=>b.createdAt-a.createdAt);
    return list;
  }
  function starsHTML(rating) {
    return [1,2,3,4,5].map(i=>`<span class="star ${i<=(rating||0)?'filled':''}">★</span>`).join('');
  }
  function placeCardHTML(place) {
    const cat=categories.find(c=>c.name===place.category);

    return `<div class="place-card ${place.visited?'visited':''}">
      <div class="place-banner">

          </div>
        </div>
        <div class="place-meta">
          ${place.area?`<span class="place-area">📍 ${esc(place.area)}</span>`:''}${place.members?`<span class="place-area" style="background:rgba(139,94,60,.08);">👥 ${esc(place.members)}</span>`:''}

    r.readAsDataURL(file);
  }
  function savePlace(){
    const name=document.getElementById('pfName').value.trim();
    if(!name){alert('請輸入店家名稱');return;}
    const data={name,category:document.getElementById('pfCategory').value,
      area:document.getElementById('pfArea').value.trim(),
      address:document.getElementById('pfAddress').value.trim(),
      source:document.getElementById('pfSource').value.trim(),
      note:document.getElementById('pfNote').value.trim(),
      members:document.getElementById('pfMembers').value.trim(),
      rating:pendingRating||null,
      tagColor:getSelectedColor('pTagColorsList'),
      img:uploadedImgData,
    };
    if(editingId){const idx=places.findIndex(x=>x.id===editingId);places[idx]={...places[idx],...data};}
    else places.unshift({id:genId(),createdAt:Date.now(),visited:false,fav:false,...data});
    savePlaces();closeModal();render();
  }

  // ── Cat Manager ──
  function openCatManager(){
    editingCats=categories.map(c=>({...c}));pendingNewEmoji='📍';
    document.getElementById('pNewCatEmojiBtn').textContent='📍';
    document.getElementById('pNewCatName').value='';
    renderCatManageList();
    document.getElementById('pCatModalOverlay').classList.add('open');
  }
  function closeCatModal(){document.getElementById('pCatModalOverlay').classList.remove('open');}
  function renderCatManageList(){
    document.getElementById('pCatListManage').innerHTML=editingCats.map((c,i)=>`
      <div class="cat-manage-row" draggable="true" ondragstart="P.dragStart(${i})" ondragover="P.dragOver(event,${i})" ondrop="P.dragDrop(${i})" ondragleave="P.dragLeave(event)">
        <span class="drag-handle">☰</span>
        <button class="cat-emoji-btn" onclick="P.openEmojiPicker(${i})">${c.icon}</button>
        <input class="cat-name-input" value="${esc(c.name)}" oninput="P._editingCats()[${i}].name=this.value" maxlength="12" placeholder="分類名稱">
        <button class="cat-delete-btn" onclick="P.removeCat(${i})">✕</button>
      </div>`).join('');
  }
  function _editingCats(){return editingCats;}
  function addCategory(){
    const name=document.getElementById('pNewCatName').value.trim();
    if(!name){document.getElementById('pNewCatName').focus();return;}
    if(editingCats.find(c=>c.name===name)){alert('分類名稱已存在');return;}
    editingCats.push({id:genId(),name,icon:pendingNewEmoji});
    document.getElementById('pNewCatName').value='';pendingNewEmoji='📍';
    document.getElementById('pNewCatEmojiBtn').textContent='📍';
    renderCatManageList();
  }
  function removeCat(i){
    const name=editingCats[i].name;
    if(places.some(p=>p.category===name)&&!confirm(`「${name}」分類下有店家，確定刪除？`))return;
    editingCats.splice(i,1);renderCatManageList();
  }
  function saveCats(){
    const names=editingCats.map(c=>c.name.trim()).filter(Boolean);
    if(new Set(names).size!==names.length){alert('分類名稱不能重複');return;}
    if(!names.length){alert('至少需要一個分類');return;}
    categories=editingCats.filter(c=>c.name.trim());
    saveCatsStore();closeCatModal();render();
  }
  function dragStart(i){dragSrcIdx=i;}
  function dragOver(e,i){e.preventDefault();document.querySelectorAll('#pCatListManage .cat-manage-row').forEach((r,ri)=>r.classList.toggle('drag-over',ri===i));}
  function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
  function dragDrop(i){
    if(dragSrcIdx===null||dragSrcIdx===i){dragSrcIdx=null;return;}
    const m=editingCats.splice(dragSrcIdx,1)[0];editingCats.splice(i,0,m);dragSrcIdx=null;
    document.querySelectorAll('#pCatListManage .cat-manage-row').forEach(r=>r.classList.remove('drag-over'));
    renderCatManageList();
  }
  function openEmojiPicker(target){
    emojiTarget=target;
    openEmojiPickerShared(EMOJI_LIST_PLACE,emoji=>{
      if(emojiTarget==='new'){pendingNewEmoji=emoji;document.getElementById('pNewCatEmojiBtn').textContent=emoji;}
      else if(typeof emojiTarget==='number'){editingCats[emojiTarget].icon=emoji;renderCatManageList();}
    });
  }

  // ── Init ──
  function init(){
    render();
  }

  function reload() {
    places = JSON.parse(localStorage.getItem('placelist_items')||'[]');
    const savedCats = JSON.parse(localStorage.getItem('placelist_cats')||'null');
    if (savedCats && savedCats.length) categories = savedCats;
    render();
  }
  return {render,setView,setCat,toggleFav,toggleVisited,deletePlace,toggleArchive,setRating,
    openAddModal,openEditModal,closeModal,handleImgUpload,savePlace,
    openCatManager,closeCatModal,addCategory,removeCat,saveCats,openEmojiPicker,
    dragStart,dragOver,dragLeave,dragDrop,_editingCats,init,reload,_pickCat};
})();

// ── Boot ──
W.init();
P.render(); // render but don't show (page 1 is hidden)

// ── Firebase 同步 ──
(async function() {
  try {
    var fb = await import('./firebase-config.js');
    // Wait for Firebase Auth state
    var user = await fb.getCurrentUser();
    if (!user) await new Promise(function(r){ setTimeout(r, 2000); });
    user = await fb.getCurrentUser();
    if (!user) return;

    var uid = null;
    try { uid = localStorage.getItem('tripApp_uid'); } catch(e) {}
    if (!uid) uid = user.uid; // fallback to auth uid
    if (!uid) return;
    var W_DOC = 'users/' + uid + '/data/wishlist';
    var P_DOC = 'users/' + uid + '/data/placelist';
    window._fbUpload = fb.uploadImage;
    window._fbSave = async function() {
      var wItems = JSON.parse(localStorage.getItem('wishlist_items')||'[]');
      var wCats  = JSON.parse(localStorage.getItem('wishlist_cats')||'[]');
      var wCur   = localStorage.getItem('wishlist_cur')||'TWD';
      await fb.fsSet(W_DOC, { items: wItems, cats: wCats, currency: wCur });
    };
    window._fbSavePlaces = async function() {
      var pItems = JSON.parse(localStorage.getItem('placelist_items')||'[]');
      var pCats  = JSON.parse(localStorage.getItem('placelist_cats')||'[]');
      await fb.fsSet(P_DOC, { items: pItems, cats: pCats });
    };
    var wSnap = await fb.fsGet(W_DOC);
    if (wSnap.exists()) {
      var wd = wSnap.data();
      if (wd.items && wd.items.length) localStorage.setItem('wishlist_items', JSON.stringify(wd.items));
      if (wd.cats  && wd.cats.length)  localStorage.setItem('wishlist_cats',  JSON.stringify(wd.cats));
      if (wd.currency) localStorage.setItem('wishlist_cur', wd.currency);
      if (window.W && window.W.reload) window.W.reload();
    }
    var pSnap = await fb.fsGet(P_DOC);
    if (pSnap.exists()) {
      var pd = pSnap.data();
      if (pd.items && pd.items.length) localStorage.setItem('placelist_items', JSON.stringify(pd.items));
      if (pd.cats  && pd.cats.length)  localStorage.setItem('placelist_cats',  JSON.stringify(pd.cats));
      if (window.P && window.P.reload) window.P.reload();
    }

    // Real-time listeners
    var _wSaving = false, _pSaving = false;
    var _rawFbSave = window._fbSave;
    window._fbSave = async function() {
      _wSaving = true;
      try { await _rawFbSave(); } catch(e) { console.warn('_fbSave error', e); }
      setTimeout(function(){ _wSaving = false; }, 4000);
    };
    var _rawFbSavePlaces = window._fbSavePlaces;
    window._fbSavePlaces = async function() {
      _pSaving = true;
      try { await _rawFbSavePlaces(); } catch(e) { console.warn('_fbSavePlaces error', e); }
      setTimeout(function(){ _pSaving = false; }, 4000);
    };
    fb.fsLive(W_DOC, function(snap) {
      if (_wSaving || !snap.exists()) return;
      var d = snap.data();
      if (d.items) localStorage.setItem('wishlist_items', JSON.stringify(d.items));
      if (d.cats)  localStorage.setItem('wishlist_cats',  JSON.stringify(d.cats));
      if (d.currency) localStorage.setItem('wishlist_cur', d.currency);
      if (window.W && window.W.reload) window.W.reload();
    });
    fb.fsLive(P_DOC, function(snap) {
      if (_pSaving || !snap.exists()) return;
      var d = snap.data();
      if (d.items) localStorage.setItem('placelist_items', JSON.stringify(d.items));
      if (d.cats)  localStorage.setItem('placelist_cats',  JSON.stringify(d.cats));
      if (window.P && window.P.reload) window.P.reload();
    });
    var badge = document.createElement('div');
    badge.style.cssText = 'position:fixed;top:10px;right:12px;z-index:9999;background:rgba(255,255,255,.9);border:1px solid #DDD4C6;border-radius:20px;padding:4px 10px;font-size:10px;font-family:sans-serif;color:#8B5E3C;font-weight:700;';
    badge.textContent = '☁ 已連線';
    document.body.appendChild(badge);
  } catch(e) {
    window._fbSave = null; window._fbSavePlaces = null; window._fbUpload = null;
  }
})();
</script>
</body>
